description: >-
  Official Twilio Agent Skills (SKILL.md, the open Agent Skills standard)
  published by Twilio at github.com/twilio/ai. Skills are structured packages of
  product knowledge that guide an AI coding agent to the right Twilio approach;
  the Twilio MCP server (see mcp/twilio-mcp.yml) then supplies the precise API
  details. Twilio publishes ~48 skills across the twilio/ and sendgrid/ product
  families; a marquee subset that mirrors this repo's arazzo/ workflows is
  captured here verbatim. Install the full set via the Claude/Cursor plugin
  `twilio-developer-kit` or `git clone https://github.com/twilio/ai`.
install:
  claude: claude plugin install twilio-developer-kit
  cursor: /add-plugin twilio-developer-kit
  manual: git clone https://github.com/twilio/ai.git && cp -r ai/skills/ ~/.agents/skills/
