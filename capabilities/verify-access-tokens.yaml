naftiko: 1.0.0-alpha2
info:
  label: Twilio Verify API — Access Tokens
  description: 'Twilio Verify API — Access Tokens. 1 operations. Lead operation: Twilio Create an Access Token. Self-contained
    Naftiko capability covering one Twilio business surface.'
  tags:
  - Twilio
  - Access Tokens
  created: '2026-05-19'
  modified: '2026-05-19'
binds:
- namespace: env
  keys:
    TWILIO_API_KEY: TWILIO_API_KEY
capability:
  consumes:
  - type: http
    namespace: verify-access-tokens
    baseUri: https://verify.twilio.com/v2
    description: Twilio Verify API — Access Tokens business capability. Self-contained, no shared references.
    resources:
    - name: Services-ServiceSid-AccessTokens
      path: /Services/{ServiceSid}/AccessTokens
      operations:
      - name: createaccesstoken
        method: POST
        description: Twilio Create an Access Token
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
        inputParameters:
        - name: body
          in: body
          type: object
          description: Request body (JSON).
          required: true
    authentication:
      type: basic
      username: '{{env.TWILIO_USER}}'
      password: '{{env.TWILIO_PASS}}'
  exposes:
  - type: rest
    namespace: verify-access-tokens-rest
    port: 8080
    description: REST adapter for Twilio Verify API — Access Tokens. One Spectral-compliant resource per consumed operation,
      prefixed with /v1.
    resources:
    - path: /v1/services/{servicesid}/accesstokens
      name: services-servicesid-accesstokens
      description: REST surface for Services-ServiceSid-AccessTokens.
      operations:
      - method: POST
        name: createaccesstoken
        description: Twilio Create an Access Token
        call: verify-access-tokens.createaccesstoken
        with:
          body: rest.body
        outputParameters:
        - type: object
          mapping: $.
  - type: mcp
    namespace: verify-access-tokens-mcp
    port: 9090
    transport: http
    description: MCP adapter for Twilio Verify API — Access Tokens. One tool per consumed operation, routed inline through
      this capability's consumes block.
    tools:
    - name: twilio-create-access-token
      description: Twilio Create an Access Token
      hints:
        readOnly: false
        destructive: false
        idempotent: false
      call: verify-access-tokens.createaccesstoken
      with:
        body: tools.body
      outputParameters:
      - type: object
        mapping: $.
