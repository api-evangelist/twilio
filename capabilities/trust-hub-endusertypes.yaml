  - type: http
    namespace: trust-hub-endusertypes
    baseUri: https://trusthub.twilio.com
    description: Twilio - Trusthub — EndUserTypes business capability. Self-contained, no shared references.
    resources:
    - name: v1-EndUserTypes
      path: /v1/EndUserTypes
      operations:
      - name: listendusertype
        method: GET
        description: Retrieve a list of all End-User Types.
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
        inputParameters:
        - name: PageSize
          in: query
          type: integer
          description: How many resources to return in each list page. The default is 50, and the maximum is 1000.
        - name: Page
          in: query
          type: integer
          description: The page index. This value is simply for client state.
        - name: PageToken
          in: query
          type: string
          description: The page token. This is provided by the API.
    - name: v1-EndUserTypes-Sid
      path: /v1/EndUserTypes/{Sid}
      operations:
      - name: fetchendusertype
        method: GET
        description: Fetch a specific End-User Type Instance.
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
        inputParameters:
        - name: Sid
          in: path
          type: string
          description: The unique string that identifies the End-User Type resource.
          required: true
    authentication:
      type: basic
      username: '{{env.TWILIO_USER}}'
      password: '{{env.TWILIO_PASS}}'
  exposes:
  - type: rest
    namespace: trust-hub-endusertypes-rest
    port: 8080
    description: REST adapter for Twilio - Trusthub — EndUserTypes. One Spectral-compliant resource per consumed operation,
      prefixed with /v1.
    resources:
    - path: /v1/v1/endusertypes
      name: v1-endusertypes
      description: REST surface for v1-EndUserTypes.
      operations:
      - method: GET
        name: listendusertype
        description: Retrieve a list of all End-User Types.
        call: trust-hub-endusertypes.listendusertype
        with:
          PageSize: rest.PageSize
          Page: rest.Page
          PageToken: rest.PageToken
        outputParameters:
        - type: object
          mapping: $.
    - path: /v1/v1/endusertypes/{sid}
      name: v1-endusertypes-sid
      description: REST surface for v1-EndUserTypes-Sid.
      operations:
      - method: GET
        name: fetchendusertype
        description: Fetch a specific End-User Type Instance.
        call: trust-hub-endusertypes.fetchendusertype
        with:
          Sid: rest.Sid
        outputParameters:
        - type: object
          mapping: $.
