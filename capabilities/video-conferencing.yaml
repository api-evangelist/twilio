naftiko: 1.0.0-alpha2
info:
  label: Twilio Video Conferencing
  description: Real-time video communication capability combining Twilio Video for room management and Twilio Accounts for
    credential management. Used by developers building telehealth, remote collaboration, education, and live event platforms
    that require video calls, recordings, and multi-participant conferencing.
  tags:
  - Twilio
  - Video
  - Conferencing
  - Real Time
  - Collaboration
  created: '2026-05-03'
  modified: '2026-05-06'
binds:
- namespace: env
  keys:
    TWILIO_ACCOUNT_SID: TWILIO_ACCOUNT_SID
    TWILIO_AUTH_TOKEN: TWILIO_AUTH_TOKEN
capability:
  consumes:
  - type: http
    namespace: twilio-video
    baseUri: https://video.twilio.com/v1
    description: Twilio Video API v1
    authentication:
      type: basic
      username: '{{TWILIO_ACCOUNT_SID}}'
      password: '{{TWILIO_AUTH_TOKEN}}'
    resources:
    - name: rooms
      path: /Rooms
      description: Create and manage video rooms
      operations:
      - name: list-rooms
        method: GET
        description: Retrieve a list of video rooms
        inputParameters:
        - name: Status
          in: query
          type: string
          required: false
          description: Filter by room status (in-progress, completed)
        - name: UniqueName
          in: query
          type: string
          required: false
          description: Filter by unique room name
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
      - name: create-room
        method: POST
        description: Create a new video room
        inputParameters: []
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
        body:
          type: form
          data:
            UniqueName: '{{tools.unique_name}}'
            Type: '{{tools.type}}'
            MaxParticipants: '{{tools.max_participants}}'
  - type: http
    namespace: twilio-accounts
    baseUri: https://accounts.twilio.com/v1
    description: Twilio Accounts API
    authentication:
      type: basic
      username: '{{TWILIO_ACCOUNT_SID}}'
      password: '{{TWILIO_AUTH_TOKEN}}'
    resources:
    - name: accounts
      path: /Accounts.json
      description: Manage Twilio accounts and subaccounts
      operations:
      - name: list-accounts
        method: GET
        description: Retrieve list of subaccounts
        inputParameters:
        - name: FriendlyName
          in: query
          type: string
          required: false
          description: Filter by friendly name
        - name: Status
          in: query
          type: string
          required: false
          description: Filter by status
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
      - name: create-account
        method: POST
        description: Create a new subaccount
        inputParameters: []
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
        body:
          type: form
          data:
            FriendlyName: '{{tools.friendly_name}}'
    - name: keys
      path: /Accounts/{AccountSid}/Keys.json
      description: Manage API keys
      operations:
      - name: list-keys
        method: GET
        description: List API keys for an account
        inputParameters:
        - name: AccountSid
          in: path
          type: string
          required: true
          description: Twilio Account SID
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
      - name: create-key
        method: POST
        description: Create a new API key
        inputParameters:
        - name: AccountSid
          in: path
          type: string
          required: true
          description: Twilio Account SID
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
        body:
          type: form
          data:
            FriendlyName: '{{tools.friendly_name}}'
  exposes:
  - type: rest
    port: 8082
    namespace: twilio-video-conference-api
    description: Unified REST API for Twilio video conferencing.
    resources:
    - path: /v1/rooms
      name: rooms
      description: Manage video rooms
      operations:
      - method: GET
        name: list-rooms
        description: List video rooms
        call: twilio-video.list-rooms
        outputParameters:
        - type: object
          mapping: $.
      - method: POST
        name: create-room
        description: Create a video room
        call: twilio-video.create-room
        outputParameters:
        - type: object
          mapping: $.
    - path: /v1/accounts
      name: accounts
      description: Manage accounts for credential administration
      operations:
      - method: GET
        name: list-accounts
        description: List accounts
        call: twilio-accounts.list-accounts
        outputParameters:
        - type: object
          mapping: $.
  - type: mcp
    port: 9092
    namespace: twilio-video-conference-mcp
    transport: http
    description: MCP server for AI-assisted Twilio video conferencing.
    tools:
    - name: list-rooms
      description: List active and completed video rooms
      hints:
        readOnly: true
        openWorld: true
      call: twilio-video.list-rooms
      outputParameters:
      - type: object
        mapping: $.
    - name: create-room
      description: Create a new video room for real-time communication
      hints:
        readOnly: false
        destructive: false
        idempotent: false
      call: twilio-video.create-room
      outputParameters:
      - type: object
        mapping: $.
    - name: list-accounts
      description: List Twilio subaccounts for credential management
      hints:
        readOnly: true
        openWorld: false
      call: twilio-accounts.list-accounts
      outputParameters:
      - type: object
        mapping: $.
    - name: create-subaccount
      description: Create a new subaccount to isolate resources for a video application
      hints:
        readOnly: false
        destructive: false
        idempotent: false
      call: twilio-accounts.create-account
      outputParameters:
      - type: object
        mapping: $.
