naftiko: 1.0.0-alpha2
info:
  label: Twilio - Wireless — Commands
  description: 'Twilio - Wireless — Commands. 4 operations. Lead operation: Commands. Self-contained Naftiko capability covering
    one Twilio business surface.'
  tags:
  - Twilio
  - Commands
  created: '2026-05-19'
  modified: '2026-05-19'
binds:
- namespace: env
  keys:
    TWILIO_API_KEY: TWILIO_API_KEY
capability:
  consumes:
  - type: http
    namespace: wireless-commands
    baseUri: https://wireless.twilio.com
    description: Twilio - Wireless — Commands business capability. Self-contained, no shared references.
    resources:
    - name: v1-Commands
      path: /v1/Commands
      operations:
      - name: listcommand
        method: GET
        description: Retrieve a list of Commands from your account.
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
        inputParameters:
        - name: Sim
          in: query
          type: string
          description: The `sid` or `unique_name` of the [Sim resources](https://www.twilio.com/docs/iot/wireless/api/sim-resource)
            to read.
        - name: Status
          in: query
          type: string
          description: 'The status of the resources to read. Can be: `queued`, `sent`, `delivered`, `received`, or `failed`.'
        - name: Direction
          in: query
          type: string
          description: Only return Commands with this direction value.
        - name: Transport
          in: query
          type: string
          description: 'Only return Commands with this transport value. Can be: `sms` or `ip`.'
        - name: PageSize
          in: query
          type: integer
          description: How many resources to return in each list page. The default is 50, and the maximum is 1000.
        - name: Page
          in: query
          type: integer
          description: The page index. This value is simply for client state.
        - name: PageToken
          in: query
          type: string
          description: The page token. This is provided by the API.
      - name: createcommand
        method: POST
        description: Send a Command to a Sim.
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
        inputParameters:
        - name: body
          in: body
          type: object
          description: Request body (JSON).
          required: false
    - name: v1-Commands-Sid
      path: /v1/Commands/{Sid}
      operations:
      - name: fetchcommand
        method: GET
        description: Fetch a Command instance from your account.
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
        inputParameters:
        - name: Sid
          in: path
          type: string
          description: The SID of the Command resource to fetch.
          required: true
      - name: deletecommand
        method: DELETE
        description: Delete a Command instance from your account.
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
        inputParameters:
        - name: Sid
          in: path
          type: string
          description: The SID of the Command resource to delete.
          required: true
    authentication:
      type: basic
      username: '{{env.TWILIO_USER}}'
      password: '{{env.TWILIO_PASS}}'
  exposes:
  - type: rest
    namespace: wireless-commands-rest
    port: 8080
    description: REST adapter for Twilio - Wireless — Commands. One Spectral-compliant resource per consumed operation, prefixed
      with /v1.
    resources:
    - path: /v1/v1/commands
      name: v1-commands
      description: REST surface for v1-Commands.
      operations:
      - method: GET
        name: listcommand
        description: Retrieve a list of Commands from your account.
        call: wireless-commands.listcommand
        with:
          Sim: rest.Sim
          Status: rest.Status
          Direction: rest.Direction
          Transport: rest.Transport
          PageSize: rest.PageSize
          Page: rest.Page
          PageToken: rest.PageToken
        outputParameters:
        - type: object
          mapping: $.
      - method: POST
        name: createcommand
        description: Send a Command to a Sim.
        call: wireless-commands.createcommand
        with:
          body: rest.body
        outputParameters:
        - type: object
          mapping: $.
    - path: /v1/v1/commands/{sid}
      name: v1-commands-sid
      description: REST surface for v1-Commands-Sid.
      operations:
      - method: GET
        name: fetchcommand
        description: Fetch a Command instance from your account.
        call: wireless-commands.fetchcommand
        with:
          Sid: rest.Sid
        outputParameters:
        - type: object
          mapping: $.
      - method: DELETE
        name: deletecommand
        description: Delete a Command instance from your account.
        call: wireless-commands.deletecommand
        with:
          Sid: rest.Sid
        outputParameters:
        - type: object
          mapping: $.
  - type: mcp
    namespace: wireless-commands-mcp
    port: 9090
    transport: http
    description: MCP adapter for Twilio - Wireless — Commands. One tool per consumed operation, routed inline through this
      capability's consumes block.
    tools:
    - name: retrieve-list-commands-your-account
      description: Retrieve a list of Commands from your account.
      hints:
        readOnly: true
        destructive: false
        idempotent: true
      call: wireless-commands.listcommand
      with:
        Sim: tools.Sim
        Status: tools.Status
        Direction: tools.Direction
        Transport: tools.Transport
        PageSize: tools.PageSize
        Page: tools.Page
        PageToken: tools.PageToken
      outputParameters:
      - type: object
        mapping: $.
    - name: send-command-sim
      description: Send a Command to a Sim.
      hints:
        readOnly: false
        destructive: false
        idempotent: false
      call: wireless-commands.createcommand
      with:
        body: tools.body
      outputParameters:
      - type: object
        mapping: $.
    - name: fetch-command-instance-your-account
      description: Fetch a Command instance from your account.
      hints:
        readOnly: true
        destructive: false
        idempotent: true
      call: wireless-commands.fetchcommand
      with:
        Sid: tools.Sid
      outputParameters:
      - type: object
        mapping: $.
    - name: delete-command-instance-your-account
      description: Delete a Command instance from your account.
      hints:
        readOnly: false
        destructive: true
        idempotent: true
      call: wireless-commands.deletecommand
      with:
        Sid: tools.Sid
      outputParameters:
      - type: object
        mapping: $.
