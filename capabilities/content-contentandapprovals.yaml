naftiko: 1.0.0-alpha2
info:
  label: Twilio - Content — ContentAndApprovals
  description: 'Twilio - Content — ContentAndApprovals. 1 operations. Lead operation: ContentAndApprovals. Self-contained
    Naftiko capability covering one Twilio business surface.'
  tags:
  - Twilio
  - ContentAndApprovals
  created: '2026-05-19'
  modified: '2026-05-19'
binds:
- namespace: env
  keys:
    TWILIO_API_KEY: TWILIO_API_KEY
capability:
  consumes:
  - type: http
    namespace: content-contentandapprovals
    baseUri: https://content.twilio.com
    description: Twilio - Content — ContentAndApprovals business capability. Self-contained, no shared references.
    resources:
    - name: v1-ContentAndApprovals
      path: /v1/ContentAndApprovals
      operations:
      - name: listcontentandapprovals
        method: GET
        description: Retrieve a list of Contents with approval statuses belonging to the account used to make the request
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
        inputParameters:
        - name: PageSize
          in: query
          type: integer
          description: How many resources to return in each list page. The default is 50, and the maximum is 1000.
        - name: Page
          in: query
          type: integer
          description: The page index. This value is simply for client state.
        - name: PageToken
          in: query
          type: string
          description: The page token. This is provided by the API.
    authentication:
      type: basic
      username: '{{env.TWILIO_USER}}'
      password: '{{env.TWILIO_PASS}}'
  exposes:
  - type: rest
    namespace: content-contentandapprovals-rest
    port: 8080
    description: REST adapter for Twilio - Content — ContentAndApprovals. One Spectral-compliant resource per consumed operation,
      prefixed with /v1.
    resources:
    - path: /v1/v1/contentandapprovals
      name: v1-contentandapprovals
      description: REST surface for v1-ContentAndApprovals.
      operations:
      - method: GET
        name: listcontentandapprovals
        description: Retrieve a list of Contents with approval statuses belonging to the account used to make the request
        call: content-contentandapprovals.listcontentandapprovals
        with:
          PageSize: rest.PageSize
          Page: rest.Page
          PageToken: rest.PageToken
        outputParameters:
        - type: object
          mapping: $.
  - type: mcp
    namespace: content-contentandapprovals-mcp
    port: 9090
    transport: http
    description: MCP adapter for Twilio - Content — ContentAndApprovals. One tool per consumed operation, routed inline through
      this capability's consumes block.
    tools:
    - name: retrieve-list-contents-approval-statuses
      description: Retrieve a list of Contents with approval statuses belonging to the account used to make the request
      hints:
        readOnly: true
        destructive: false
        idempotent: true
      call: content-contentandapprovals.listcontentandapprovals
      with:
        PageSize: tools.PageSize
        Page: tools.Page
        PageToken: tools.PageToken
      outputParameters:
      - type: object
        mapping: $.
