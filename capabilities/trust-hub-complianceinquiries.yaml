naftiko: 1.0.0-alpha2
info:
  label: Twilio - Trusthub — ComplianceInquiries
  description: 'Twilio - Trusthub — ComplianceInquiries. 3 operations. Lead operation: ComplianceInquiries. Self-contained
    Naftiko capability covering one Twilio business surface.'
  tags:
  - Twilio
  - ComplianceInquiries
  created: '2026-05-19'
  modified: '2026-05-19'
binds:
- namespace: env
  keys:
    TWILIO_API_KEY: TWILIO_API_KEY
capability:
  consumes:
  - type: http
    namespace: trust-hub-complianceinquiries
    baseUri: https://trusthub.twilio.com
    description: Twilio - Trusthub — ComplianceInquiries business capability. Self-contained, no shared references.
    resources:
    - name: v1-ComplianceInquiries-Customers-Initialize
      path: /v1/ComplianceInquiries/Customers/Initialize
      operations:
      - name: createcomplianceinquiry
        method: POST
        description: Create a new Compliance Inquiry for the authenticated account. This is necessary to start a new embedded
          session.
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
        inputParameters:
        - name: body
          in: body
          type: object
          description: Request body (JSON).
          required: false
    - name: v1-ComplianceInquiries-Customers-CustomerId-Initialize
      path: /v1/ComplianceInquiries/Customers/{CustomerId}/Initialize
      operations:
      - name: updatecomplianceinquiry
        method: POST
        description: Resume a specific Compliance Inquiry that has expired, or re-open a rejected Compliance Inquiry for editing.
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
        inputParameters:
        - name: CustomerId
          in: path
          type: string
          description: 'The unique CustomerId matching the Customer Profile/Compliance Inquiry that should be resumed or resubmitted.
            This value will have been returned by the initial '
          required: true
        - name: body
          in: body
          type: object
          description: Request body (JSON).
          required: false
    - name: v1-ComplianceInquiries-Tollfree-Initialize
      path: /v1/ComplianceInquiries/Tollfree/Initialize
      operations:
      - name: createcompliancetollfreeinquiry
        method: POST
        description: Create a new Compliance Tollfree Verification Inquiry for the authenticated account. This is necessary
          to start a new embedded session.
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
        inputParameters:
        - name: body
          in: body
          type: object
          description: Request body (JSON).
          required: false
    authentication:
      type: basic
      username: '{{env.TWILIO_USER}}'
      password: '{{env.TWILIO_PASS}}'
  exposes:
  - type: rest
    namespace: trust-hub-complianceinquiries-rest
    port: 8080
    description: REST adapter for Twilio - Trusthub — ComplianceInquiries. One Spectral-compliant resource per consumed operation,
      prefixed with /v1.
    resources:
    - path: /v1/v1/complianceinquiries/customers/initialize
      name: v1-complianceinquiries-customers-initialize
      description: REST surface for v1-ComplianceInquiries-Customers-Initialize.
      operations:
      - method: POST
        name: createcomplianceinquiry
        description: Create a new Compliance Inquiry for the authenticated account. This is necessary to start a new embedded
          session.
        call: trust-hub-complianceinquiries.createcomplianceinquiry
        with:
          body: rest.body
        outputParameters:
        - type: object
          mapping: $.
    - path: /v1/v1/complianceinquiries/customers/{customerid}/initialize
      name: v1-complianceinquiries-customers-customerid-initialize
      description: REST surface for v1-ComplianceInquiries-Customers-CustomerId-Initialize.
      operations:
      - method: POST
        name: updatecomplianceinquiry
        description: Resume a specific Compliance Inquiry that has expired, or re-open a rejected Compliance Inquiry for editing.
        call: trust-hub-complianceinquiries.updatecomplianceinquiry
        with:
          CustomerId: rest.CustomerId
          body: rest.body
        outputParameters:
        - type: object
          mapping: $.
    - path: /v1/v1/complianceinquiries/tollfree/initialize
      name: v1-complianceinquiries-tollfree-initialize
      description: REST surface for v1-ComplianceInquiries-Tollfree-Initialize.
      operations:
      - method: POST
        name: createcompliancetollfreeinquiry
        description: Create a new Compliance Tollfree Verification Inquiry for the authenticated account. This is necessary
          to start a new embedded session.
        call: trust-hub-complianceinquiries.createcompliancetollfreeinquiry
        with:
          body: rest.body
        outputParameters:
        - type: object
          mapping: $.
  - type: mcp
    namespace: trust-hub-complianceinquiries-mcp
    port: 9090
    transport: http
    description: MCP adapter for Twilio - Trusthub — ComplianceInquiries. One tool per consumed operation, routed inline through
      this capability's consumes block.
    tools:
    - name: create-new-compliance-inquiry-authenticated
      description: Create a new Compliance Inquiry for the authenticated account. This is necessary to start a new embedded
        session.
      hints:
        readOnly: false
        destructive: false
        idempotent: false
      call: trust-hub-complianceinquiries.createcomplianceinquiry
      with:
        body: tools.body
      outputParameters:
      - type: object
        mapping: $.
    - name: resume-specific-compliance-inquiry-that
      description: Resume a specific Compliance Inquiry that has expired, or re-open a rejected Compliance Inquiry for editing.
      hints:
        readOnly: false
        destructive: false
        idempotent: false
      call: trust-hub-complianceinquiries.updatecomplianceinquiry
      with:
        CustomerId: tools.CustomerId
        body: tools.body
      outputParameters:
      - type: object
        mapping: $.
    - name: create-new-compliance-tollfree-verification
      description: Create a new Compliance Tollfree Verification Inquiry for the authenticated account. This is necessary
        to start a new embedded session.
      hints:
        readOnly: false
        destructive: false
        idempotent: false
      call: trust-hub-complianceinquiries.createcompliancetollfreeinquiry
      with:
        body: tools.body
      outputParameters:
      - type: object
        mapping: $.
