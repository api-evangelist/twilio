naftiko: 1.0.0-alpha2
info:
  label: Twilio SendGrid Email API — Email Validation
  description: 'Twilio SendGrid Email API — Email Validation. 1 operations. Lead operation: Twilio Validate an Email Address.
    Self-contained Naftiko capability covering one Twilio business surface.'
  tags:
  - Twilio
  - Email Validation
  created: '2026-05-19'
  modified: '2026-05-19'
binds:
- namespace: env
  keys:
    TWILIO_API_KEY: TWILIO_API_KEY
capability:
  consumes:
  - type: http
    namespace: sendgrid-email-validation
    baseUri: https://api.sendgrid.com/v3
    description: Twilio SendGrid Email API — Email Validation business capability. Self-contained, no shared references.
    resources:
    - name: validations-email
      path: /validations/email
      operations:
      - name: validateemail
        method: POST
        description: Twilio Validate an Email Address
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
        inputParameters:
        - name: body
          in: body
          type: object
          description: Request body (JSON).
          required: true
    authentication:
      type: bearer
      token: '{{env.TWILIO_API_KEY}}'
  exposes:
  - type: rest
    namespace: sendgrid-email-validation-rest
    port: 8080
    description: REST adapter for Twilio SendGrid Email API — Email Validation. One Spectral-compliant resource per consumed
      operation, prefixed with /v1.
    resources:
    - path: /v1/validations/email
      name: validations-email
      description: REST surface for validations-email.
      operations:
      - method: POST
        name: validateemail
        description: Twilio Validate an Email Address
        call: sendgrid-email-validation.validateemail
        with:
          body: rest.body
        outputParameters:
        - type: object
          mapping: $.
  - type: mcp
    namespace: sendgrid-email-validation-mcp
    port: 9090
    transport: http
    description: MCP adapter for Twilio SendGrid Email API — Email Validation. One tool per consumed operation, routed inline
      through this capability's consumes block.
    tools:
    - name: twilio-validate-email-address
      description: Twilio Validate an Email Address
      hints:
        readOnly: true
        destructive: false
        idempotent: false
      call: sendgrid-email-validation.validateemail
      with:
        body: tools.body
      outputParameters:
      - type: object
        mapping: $.
