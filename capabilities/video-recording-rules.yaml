naftiko: 1.0.0-alpha2
info:
  label: Twilio Video API — Recording Rules
  description: 'Twilio Video API — Recording Rules. 2 operations. Lead operation: Twilio Fetch Recording Rules. Self-contained
    Naftiko capability covering one Twilio business surface.'
  tags:
  - Twilio
  - Recording Rules
  created: '2026-05-19'
  modified: '2026-05-19'
binds:
- namespace: env
  keys:
    TWILIO_API_KEY: TWILIO_API_KEY
capability:
  consumes:
  - type: http
    namespace: video-recording-rules
    baseUri: https://video.twilio.com/v1
    description: Twilio Video API — Recording Rules business capability. Self-contained, no shared references.
    resources:
    - name: Rooms-RoomSid-RecordingRules
      path: /Rooms/{RoomSid}/RecordingRules
      operations:
      - name: fetchrecordingrules
        method: GET
        description: Twilio Fetch Recording Rules
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
      - name: updaterecordingrules
        method: POST
        description: Twilio Update Recording Rules
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
        inputParameters:
        - name: body
          in: body
          type: object
          description: Request body (JSON).
          required: true
    authentication:
      type: basic
      username: '{{env.TWILIO_USER}}'
      password: '{{env.TWILIO_PASS}}'
  exposes:
  - type: rest
    namespace: video-recording-rules-rest
    port: 8080
    description: REST adapter for Twilio Video API — Recording Rules. One Spectral-compliant resource per consumed operation,
      prefixed with /v1.
    resources:
    - path: /v1/rooms/{roomsid}/recordingrules
      name: rooms-roomsid-recordingrules
      description: REST surface for Rooms-RoomSid-RecordingRules.
      operations:
      - method: GET
        name: fetchrecordingrules
        description: Twilio Fetch Recording Rules
        call: video-recording-rules.fetchrecordingrules
        outputParameters:
        - type: object
          mapping: $.
      - method: POST
        name: updaterecordingrules
        description: Twilio Update Recording Rules
        call: video-recording-rules.updaterecordingrules
        with:
          body: rest.body
        outputParameters:
        - type: object
          mapping: $.
  - type: mcp
    namespace: video-recording-rules-mcp
    port: 9090
    transport: http
    description: MCP adapter for Twilio Video API — Recording Rules. One tool per consumed operation, routed inline through
      this capability's consumes block.
    tools:
    - name: twilio-fetch-recording-rules
      description: Twilio Fetch Recording Rules
      hints:
        readOnly: true
        destructive: false
        idempotent: true
      call: video-recording-rules.fetchrecordingrules
      outputParameters:
      - type: object
        mapping: $.
    - name: twilio-update-recording-rules
      description: Twilio Update Recording Rules
      hints:
        readOnly: false
        destructive: false
        idempotent: false
      call: video-recording-rules.updaterecordingrules
      with:
        body: tools.body
      outputParameters:
      - type: object
        mapping: $.
