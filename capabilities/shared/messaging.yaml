naftiko: "1.0.0-alpha1"

info:
  label: "Twilio Messaging API"
  description: "Send and receive SMS and MMS messages globally. Supports programmable messaging, messaging services, A2P 10DLC, toll-free verification, and link shortening."
  tags:
    - Twilio
    - Messaging
    - SMS
    - MMS
  created: "2026-05-03"
  modified: "2026-05-03"

binds:
  - namespace: env
    keys:
      TWILIO_ACCOUNT_SID: TWILIO_ACCOUNT_SID
      TWILIO_AUTH_TOKEN: TWILIO_AUTH_TOKEN

capability:
  consumes:
    - type: http
      namespace: twilio-messaging
      baseUri: https://api.twilio.com/2010-04-01
      description: "Twilio Messaging API for SMS and MMS"
      authentication:
        type: basic
        username: "{{TWILIO_ACCOUNT_SID}}"
        password: "{{TWILIO_AUTH_TOKEN}}"
      resources:
        - name: messages
          path: /Accounts/{AccountSid}/Messages.json
          description: "Send and retrieve SMS/MMS messages"
          operations:
            - name: list-messages
              method: GET
              description: "Retrieve a list of messages"
              inputParameters:
                - name: AccountSid
                  in: path
                  type: string
                  required: true
                  description: "Twilio Account SID"
                - name: To
                  in: query
                  type: string
                  required: false
                  description: "Filter by recipient phone number"
                - name: From
                  in: query
                  type: string
                  required: false
                  description: "Filter by sender phone number"
                - name: PageSize
                  in: query
                  type: integer
                  required: false
                  description: "Records per page"
              outputRawFormat: json
              outputParameters:
                - name: result
                  type: object
                  value: "$."
            - name: send-message
              method: POST
              description: "Send an SMS or MMS message"
              inputParameters:
                - name: AccountSid
                  in: path
                  type: string
                  required: true
                  description: "Twilio Account SID"
              outputRawFormat: json
              outputParameters:
                - name: result
                  type: object
                  value: "$."
              body:
                type: form
                data:
                  To: "{{tools.to}}"
                  From: "{{tools.from}}"
                  Body: "{{tools.body}}"
            - name: fetch-message
              method: GET
              description: "Retrieve details of a specific message"
              inputParameters:
                - name: AccountSid
                  in: path
                  type: string
                  required: true
                  description: "Twilio Account SID"
                - name: MessageSid
                  in: path
                  type: string
                  required: true
                  description: "Message SID"
              outputRawFormat: json
              outputParameters:
                - name: result
                  type: object
                  value: "$."
            - name: delete-message
              method: DELETE
              description: "Delete a message record"
              inputParameters:
                - name: AccountSid
                  in: path
                  type: string
                  required: true
                  description: "Twilio Account SID"
                - name: MessageSid
                  in: path
                  type: string
                  required: true
                  description: "Message SID"
              outputRawFormat: json
              outputParameters:
                - name: result
                  type: object
                  value: "$."

  exposes:
    - type: rest
      port: 8101
      namespace: twilio-messaging-api
      resources:
        - path: /v1/messages
          name: messages
          description: "Manage SMS and MMS messages"
          operations:
            - method: GET
              name: list-messages
              description: "List messages"
              call: "twilio-messaging.list-messages"
              outputParameters:
                - type: object
                  mapping: "$."
            - method: POST
              name: send-message
              description: "Send a message"
              call: "twilio-messaging.send-message"
              outputParameters:
                - type: object
                  mapping: "$."

    - type: mcp
      port: 9101
      namespace: twilio-messaging-mcp
      transport: http
      tools:
        - name: list-messages
          description: "Retrieve a list of SMS/MMS messages"
          hints:
            readOnly: true
            openWorld: true
          call: "twilio-messaging.list-messages"
          outputParameters:
            - type: object
              mapping: "$."
        - name: send-message
          description: "Send an SMS or MMS message"
          hints:
            readOnly: false
            destructive: false
            idempotent: false
          call: "twilio-messaging.send-message"
          outputParameters:
            - type: object
              mapping: "$."
        - name: fetch-message
          description: "Fetch details of a specific message"
          hints:
            readOnly: true
            openWorld: false
          call: "twilio-messaging.fetch-message"
          outputParameters:
            - type: object
              mapping: "$."
