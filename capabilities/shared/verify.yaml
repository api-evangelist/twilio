naftiko: "1.0.0-alpha1"

info:
  label: "Twilio Verify API"
  description: "User verification and two-factor authentication. Send and check verification codes via SMS, voice, email, WhatsApp, or push notifications. Supports TOTP, push authentication, and fraud prevention."
  tags:
    - Twilio
    - Verification
    - Authentication
    - Two Factor Authentication
    - Fraud Prevention
  created: "2026-05-03"
  modified: "2026-05-03"

binds:
  - namespace: env
    keys:
      TWILIO_ACCOUNT_SID: TWILIO_ACCOUNT_SID
      TWILIO_AUTH_TOKEN: TWILIO_AUTH_TOKEN

capability:
  consumes:
    - type: http
      namespace: twilio-verify
      baseUri: https://verify.twilio.com/v2
      description: "Twilio Verify API v2"
      authentication:
        type: basic
        username: "{{TWILIO_ACCOUNT_SID}}"
        password: "{{TWILIO_AUTH_TOKEN}}"
      resources:
        - name: verifications
          path: /Services/{ServiceSid}/Verifications
          description: "Send verification codes"
          operations:
            - name: start-verification
              method: POST
              description: "Start a verification by sending a code"
              inputParameters:
                - name: ServiceSid
                  in: path
                  type: string
                  required: true
                  description: "Verify Service SID"
              outputRawFormat: json
              outputParameters:
                - name: result
                  type: object
                  value: "$."
              body:
                type: form
                data:
                  To: "{{tools.to}}"
                  Channel: "{{tools.channel}}"
            - name: fetch-verification
              method: GET
              description: "Fetch a verification status"
              inputParameters:
                - name: ServiceSid
                  in: path
                  type: string
                  required: true
                  description: "Verify Service SID"
                - name: Sid
                  in: path
                  type: string
                  required: true
                  description: "Verification SID or phone number"
              outputRawFormat: json
              outputParameters:
                - name: result
                  type: object
                  value: "$."
        - name: verification-checks
          path: /Services/{ServiceSid}/VerificationCheck
          description: "Check verification codes"
          operations:
            - name: check-verification
              method: POST
              description: "Check a verification code"
              inputParameters:
                - name: ServiceSid
                  in: path
                  type: string
                  required: true
                  description: "Verify Service SID"
              outputRawFormat: json
              outputParameters:
                - name: result
                  type: object
                  value: "$."
              body:
                type: form
                data:
                  To: "{{tools.to}}"
                  Code: "{{tools.code}}"

  exposes:
    - type: rest
      port: 8103
      namespace: twilio-verify-api
      resources:
        - path: /v1/verifications
          name: verifications
          description: "Manage verifications"
          operations:
            - method: POST
              name: start-verification
              description: "Start a verification"
              call: "twilio-verify.start-verification"
              outputParameters:
                - type: object
                  mapping: "$."
        - path: /v1/verification-checks
          name: verification-checks
          description: "Check verification codes"
          operations:
            - method: POST
              name: check-verification
              description: "Check a verification code"
              call: "twilio-verify.check-verification"
              outputParameters:
                - type: object
                  mapping: "$."

    - type: mcp
      port: 9103
      namespace: twilio-verify-mcp
      transport: http
      tools:
        - name: start-verification
          description: "Send a verification code via SMS, voice, email, or push"
          hints:
            readOnly: false
            destructive: false
            idempotent: false
          call: "twilio-verify.start-verification"
          with:
            ServiceSid: "tools.service_sid"
          outputParameters:
            - type: object
              mapping: "$."
        - name: check-verification
          description: "Verify a code submitted by a user"
          hints:
            readOnly: false
            destructive: false
            idempotent: false
          call: "twilio-verify.check-verification"
          with:
            ServiceSid: "tools.service_sid"
          outputParameters:
            - type: object
              mapping: "$."
        - name: fetch-verification
          description: "Fetch the status of a verification"
          hints:
            readOnly: true
            openWorld: false
          call: "twilio-verify.fetch-verification"
          outputParameters:
            - type: object
              mapping: "$."
