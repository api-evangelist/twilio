naftiko: "1.0.0-alpha1"

info:
  label: "Twilio Lookup API"
  description: "Query phone number information for validation, carrier details, line type intelligence, caller identity, SIM swap detection, and fraud risk assessment."
  tags:
    - Twilio
    - Lookup
    - Phone Numbers
    - Fraud Prevention
    - Identity
  created: "2026-05-03"
  modified: "2026-05-03"

binds:
  - namespace: env
    keys:
      TWILIO_ACCOUNT_SID: TWILIO_ACCOUNT_SID
      TWILIO_AUTH_TOKEN: TWILIO_AUTH_TOKEN

capability:
  consumes:
    - type: http
      namespace: twilio-lookup
      baseUri: https://lookups.twilio.com/v2
      description: "Twilio Lookup API v2"
      authentication:
        type: basic
        username: "{{TWILIO_ACCOUNT_SID}}"
        password: "{{TWILIO_AUTH_TOKEN}}"
      resources:
        - name: phone-numbers
          path: /PhoneNumbers/{PhoneNumber}
          description: "Query phone number intelligence"
          operations:
            - name: fetch-phone-number
              method: GET
              description: "Look up phone number intelligence data"
              inputParameters:
                - name: PhoneNumber
                  in: path
                  type: string
                  required: true
                  description: "Phone number in E.164 format"
                - name: Fields
                  in: query
                  type: string
                  required: false
                  description: "Comma-separated data packages (validation, line_type_intelligence, caller_name, sim_swap, identity_match, sms_pumping_risk)"
              outputRawFormat: json
              outputParameters:
                - name: result
                  type: object
                  value: "$."

  exposes:
    - type: rest
      port: 8104
      namespace: twilio-lookup-api
      resources:
        - path: /v1/phone-numbers/{phone_number}
          name: phone-numbers
          description: "Lookup phone number data"
          operations:
            - method: GET
              name: fetch-phone-number
              description: "Look up a phone number"
              call: "twilio-lookup.fetch-phone-number"
              with:
                PhoneNumber: "rest.phone_number"
              outputParameters:
                - type: object
                  mapping: "$."

    - type: mcp
      port: 9104
      namespace: twilio-lookup-mcp
      transport: http
      tools:
        - name: lookup-phone-number
          description: "Query intelligence data for a phone number including validation, carrier, line type, and fraud risk"
          hints:
            readOnly: true
            openWorld: true
          call: "twilio-lookup.fetch-phone-number"
          with:
            PhoneNumber: "tools.phone_number"
          outputParameters:
            - type: object
              mapping: "$."
