naftiko: "1.0.0-alpha1"

info:
  label: "Twilio Video API"
  description: "Build real-time video communication applications. Create and manage video rooms, control participants, manage recordings, compositions, and recording rules."
  tags:
    - Twilio
    - Video
    - Real Time
    - Conferencing
  created: "2026-05-03"
  modified: "2026-05-03"

binds:
  - namespace: env
    keys:
      TWILIO_ACCOUNT_SID: TWILIO_ACCOUNT_SID
      TWILIO_AUTH_TOKEN: TWILIO_AUTH_TOKEN

capability:
  consumes:
    - type: http
      namespace: twilio-video
      baseUri: https://video.twilio.com/v1
      description: "Twilio Video API v1"
      authentication:
        type: basic
        username: "{{TWILIO_ACCOUNT_SID}}"
        password: "{{TWILIO_AUTH_TOKEN}}"
      resources:
        - name: rooms
          path: /Rooms
          description: "Create and manage video rooms"
          operations:
            - name: list-rooms
              method: GET
              description: "Retrieve a list of video rooms"
              inputParameters:
                - name: Status
                  in: query
                  type: string
                  required: false
                  description: "Filter by room status (in-progress, completed)"
                - name: UniqueName
                  in: query
                  type: string
                  required: false
                  description: "Filter by unique room name"
              outputRawFormat: json
              outputParameters:
                - name: result
                  type: object
                  value: "$."
            - name: create-room
              method: POST
              description: "Create a new video room"
              inputParameters: []
              outputRawFormat: json
              outputParameters:
                - name: result
                  type: object
                  value: "$."
              body:
                type: form
                data:
                  UniqueName: "{{tools.unique_name}}"
                  Type: "{{tools.type}}"
                  MaxParticipants: "{{tools.max_participants}}"

  exposes:
    - type: rest
      port: 8105
      namespace: twilio-video-api
      resources:
        - path: /v1/rooms
          name: rooms
          description: "Manage video rooms"
          operations:
            - method: GET
              name: list-rooms
              description: "List video rooms"
              call: "twilio-video.list-rooms"
              outputParameters:
                - type: object
                  mapping: "$."
            - method: POST
              name: create-room
              description: "Create a video room"
              call: "twilio-video.create-room"
              outputParameters:
                - type: object
                  mapping: "$."

    - type: mcp
      port: 9105
      namespace: twilio-video-mcp
      transport: http
      tools:
        - name: list-rooms
          description: "List video rooms"
          hints:
            readOnly: true
            openWorld: true
          call: "twilio-video.list-rooms"
          outputParameters:
            - type: object
              mapping: "$."
        - name: create-room
          description: "Create a new video room for real-time communication"
          hints:
            readOnly: false
            destructive: false
            idempotent: false
          call: "twilio-video.create-room"
          outputParameters:
            - type: object
              mapping: "$."
