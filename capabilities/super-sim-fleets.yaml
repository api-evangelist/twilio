naftiko: 1.0.0-alpha2
info:
  label: Twilio - Supersim — Fleets
  description: 'Twilio - Supersim — Fleets. 4 operations. Lead operation: Fleets. Self-contained Naftiko capability covering
    one Twilio business surface.'
  tags:
  - Twilio
  - Fleets
  created: '2026-05-19'
  modified: '2026-05-19'
binds:
- namespace: env
  keys:
    TWILIO_API_KEY: TWILIO_API_KEY
capability:
  consumes:
  - type: http
    namespace: super-sim-fleets
    baseUri: https://supersim.twilio.com
    description: Twilio - Supersim — Fleets business capability. Self-contained, no shared references.
    resources:
    - name: v1-Fleets
      path: /v1/Fleets
      operations:
      - name: createfleet
        method: POST
        description: Create a Fleet
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
        inputParameters:
        - name: body
          in: body
          type: object
          description: Request body (JSON).
          required: false
      - name: listfleet
        method: GET
        description: Retrieve a list of Fleets from your account.
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
        inputParameters:
        - name: NetworkAccessProfile
          in: query
          type: string
          description: The SID or unique name of the Network Access Profile that controls which cellular networks the Fleet's
            SIMs can connect to.
        - name: PageSize
          in: query
          type: integer
          description: How many resources to return in each list page. The default is 50, and the maximum is 1000.
        - name: Page
          in: query
          type: integer
          description: The page index. This value is simply for client state.
        - name: PageToken
          in: query
          type: string
          description: The page token. This is provided by the API.
    - name: v1-Fleets-Sid
      path: /v1/Fleets/{Sid}
      operations:
      - name: fetchfleet
        method: GET
        description: Fetch a Fleet instance from your account.
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
        inputParameters:
        - name: Sid
          in: path
          type: string
          description: The SID of the Fleet resource to fetch.
          required: true
      - name: updatefleet
        method: POST
        description: Updates the given properties of a Super SIM Fleet instance from your account.
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
        inputParameters:
        - name: Sid
          in: path
          type: string
          description: The SID of the Fleet resource to update.
          required: true
        - name: body
          in: body
          type: object
          description: Request body (JSON).
          required: false
    authentication:
      type: basic
      username: '{{env.TWILIO_USER}}'
      password: '{{env.TWILIO_PASS}}'
  exposes:
  - type: rest
    namespace: super-sim-fleets-rest
    port: 8080
    description: REST adapter for Twilio - Supersim — Fleets. One Spectral-compliant resource per consumed operation, prefixed
      with /v1.
    resources:
    - path: /v1/v1/fleets
      name: v1-fleets
      description: REST surface for v1-Fleets.
      operations:
      - method: POST
        name: createfleet
        description: Create a Fleet
        call: super-sim-fleets.createfleet
        with:
          body: rest.body
        outputParameters:
        - type: object
          mapping: $.
      - method: GET
        name: listfleet
        description: Retrieve a list of Fleets from your account.
        call: super-sim-fleets.listfleet
        with:
          NetworkAccessProfile: rest.NetworkAccessProfile
          PageSize: rest.PageSize
          Page: rest.Page
          PageToken: rest.PageToken
        outputParameters:
        - type: object
          mapping: $.
    - path: /v1/v1/fleets/{sid}
      name: v1-fleets-sid
      description: REST surface for v1-Fleets-Sid.
      operations:
      - method: GET
        name: fetchfleet
        description: Fetch a Fleet instance from your account.
        call: super-sim-fleets.fetchfleet
        with:
          Sid: rest.Sid
        outputParameters:
        - type: object
          mapping: $.
      - method: POST
        name: updatefleet
        description: Updates the given properties of a Super SIM Fleet instance from your account.
        call: super-sim-fleets.updatefleet
        with:
          Sid: rest.Sid
          body: rest.body
        outputParameters:
        - type: object
          mapping: $.
  - type: mcp
    namespace: super-sim-fleets-mcp
    port: 9090
    transport: http
    description: MCP adapter for Twilio - Supersim — Fleets. One tool per consumed operation, routed inline through this capability's
      consumes block.
    tools:
    - name: create-fleet
      description: Create a Fleet
      hints:
        readOnly: false
        destructive: false
        idempotent: false
      call: super-sim-fleets.createfleet
      with:
        body: tools.body
      outputParameters:
      - type: object
        mapping: $.
    - name: retrieve-list-fleets-your-account
      description: Retrieve a list of Fleets from your account.
      hints:
        readOnly: true
        destructive: false
        idempotent: true
      call: super-sim-fleets.listfleet
      with:
        NetworkAccessProfile: tools.NetworkAccessProfile
        PageSize: tools.PageSize
        Page: tools.Page
        PageToken: tools.PageToken
      outputParameters:
      - type: object
        mapping: $.
    - name: fetch-fleet-instance-your-account
      description: Fetch a Fleet instance from your account.
      hints:
        readOnly: true
        destructive: false
        idempotent: true
      call: super-sim-fleets.fetchfleet
      with:
        Sid: tools.Sid
      outputParameters:
      - type: object
        mapping: $.
    - name: updates-given-properties-super-sim
      description: Updates the given properties of a Super SIM Fleet instance from your account.
      hints:
        readOnly: false
        destructive: false
        idempotent: false
      call: super-sim-fleets.updatefleet
      with:
        Sid: tools.Sid
        body: tools.body
      outputParameters:
      - type: object
        mapping: $.
