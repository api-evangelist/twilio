naftiko: 1.0.0-alpha2
info:
  label: Twilio - Monitor — Events
  description: 'Twilio - Monitor — Events. 2 operations. Lead operation: Events. Self-contained Naftiko capability covering
    one Twilio business surface.'
  tags:
  - Twilio
  - Events
  created: '2026-05-19'
  modified: '2026-05-19'
binds:
- namespace: env
  keys:
    TWILIO_API_KEY: TWILIO_API_KEY
capability:
  consumes:
  - type: http
    namespace: monitor-events
    baseUri: https://monitor.twilio.com
    description: Twilio - Monitor — Events business capability. Self-contained, no shared references.
    resources:
    - name: v1-Events
      path: /v1/Events
      operations:
      - name: listevent
        method: GET
        description: Returns a list of events in the account, sorted by event-date.
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
        inputParameters:
        - name: ActorSid
          in: query
          type: string
          description: Only include events initiated by this Actor. Useful for auditing actions taken by specific users or
            API credentials.
        - name: EventType
          in: query
          type: string
          description: Only include events of this [Event Type](https://www.twilio.com/docs/usage/monitor-events#event-types).
        - name: ResourceSid
          in: query
          type: string
          description: Only include events that refer to this resource. Useful for discovering the history of a specific resource.
        - name: SourceIpAddress
          in: query
          type: string
          description: Only include events that originated from this IP address. Useful for tracking suspicious activity originating
            from the API or the Twilio Console.
        - name: StartDate
          in: query
          type: string
          description: Only include events that occurred on or after this date. Specify the date in GMT and [ISO 8601](https://en.wikipedia.org/wiki/ISO_8601)
            format.
        - name: EndDate
          in: query
          type: string
          description: Only include events that occurred on or before this date. Specify the date in GMT and [ISO 8601](https://en.wikipedia.org/wiki/ISO_8601)
            format.
        - name: PageSize
          in: query
          type: integer
          description: How many resources to return in each list page. The default is 50, and the maximum is 1000.
        - name: Page
          in: query
          type: integer
          description: The page index. This value is simply for client state.
        - name: PageToken
          in: query
          type: string
          description: The page token. This is provided by the API.
    - name: v1-Events-Sid
      path: /v1/Events/{Sid}
      operations:
      - name: fetchevent
        method: GET
        description: ''
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
        inputParameters:
        - name: Sid
          in: path
          type: string
          description: The SID of the Event resource to fetch.
          required: true
    authentication:
      type: basic
      username: '{{env.TWILIO_USER}}'
      password: '{{env.TWILIO_PASS}}'
  exposes:
  - type: rest
    namespace: monitor-events-rest
    port: 8080
    description: REST adapter for Twilio - Monitor — Events. One Spectral-compliant resource per consumed operation, prefixed
      with /v1.
    resources:
    - path: /v1/v1/events
      name: v1-events
      description: REST surface for v1-Events.
      operations:
      - method: GET
        name: listevent
        description: Returns a list of events in the account, sorted by event-date.
        call: monitor-events.listevent
        with:
          ActorSid: rest.ActorSid
          EventType: rest.EventType
          ResourceSid: rest.ResourceSid
          SourceIpAddress: rest.SourceIpAddress
          StartDate: rest.StartDate
          EndDate: rest.EndDate
          PageSize: rest.PageSize
          Page: rest.Page
          PageToken: rest.PageToken
        outputParameters:
        - type: object
          mapping: $.
    - path: /v1/v1/events/{sid}
      name: v1-events-sid
      description: REST surface for v1-Events-Sid.
      operations:
      - method: GET
        name: fetchevent
        description: fetchevent
        call: monitor-events.fetchevent
        with:
          Sid: rest.Sid
        outputParameters:
        - type: object
          mapping: $.
  - type: mcp
    namespace: monitor-events-mcp
    port: 9090
    transport: http
    description: MCP adapter for Twilio - Monitor — Events. One tool per consumed operation, routed inline through this capability's
      consumes block.
    tools:
    - name: returns-list-events-account-sorted
      description: Returns a list of events in the account, sorted by event-date.
      hints:
        readOnly: true
        destructive: false
        idempotent: true
      call: monitor-events.listevent
      with:
        ActorSid: tools.ActorSid
        EventType: tools.EventType
        ResourceSid: tools.ResourceSid
        SourceIpAddress: tools.SourceIpAddress
        StartDate: tools.StartDate
        EndDate: tools.EndDate
        PageSize: tools.PageSize
        Page: tools.Page
        PageToken: tools.PageToken
      outputParameters:
      - type: object
        mapping: $.
    - name: fetchevent
      description: fetchevent
      hints:
        readOnly: true
        destructive: false
        idempotent: true
      call: monitor-events.fetchevent
      with:
        Sid: tools.Sid
      outputParameters:
      - type: object
        mapping: $.
