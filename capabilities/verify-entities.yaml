naftiko: 1.0.0-alpha2
info:
  label: Twilio Verify API — Entities
  description: 'Twilio Verify API — Entities. 2 operations. Lead operation: Twilio List Entities. Self-contained Naftiko capability
    covering one Twilio business surface.'
  tags:
  - Twilio
  - Entities
  created: '2026-05-19'
  modified: '2026-05-19'
binds:
- namespace: env
  keys:
    TWILIO_API_KEY: TWILIO_API_KEY
capability:
  consumes:
  - type: http
    namespace: verify-entities
    baseUri: https://verify.twilio.com/v2
    description: Twilio Verify API — Entities business capability. Self-contained, no shared references.
    resources:
    - name: Services-ServiceSid-Entities
      path: /Services/{ServiceSid}/Entities
      operations:
      - name: listentities
        method: GET
        description: Twilio List Entities
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
      - name: createentity
        method: POST
        description: Twilio Create an Entity
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
        inputParameters:
        - name: body
          in: body
          type: object
          description: Request body (JSON).
          required: true
    authentication:
      type: basic
      username: '{{env.TWILIO_USER}}'
      password: '{{env.TWILIO_PASS}}'
  exposes:
  - type: rest
    namespace: verify-entities-rest
    port: 8080
    description: REST adapter for Twilio Verify API — Entities. One Spectral-compliant resource per consumed operation, prefixed
      with /v1.
    resources:
    - path: /v1/services/{servicesid}/entities
      name: services-servicesid-entities
      description: REST surface for Services-ServiceSid-Entities.
      operations:
      - method: GET
        name: listentities
        description: Twilio List Entities
        call: verify-entities.listentities
        outputParameters:
        - type: object
          mapping: $.
      - method: POST
        name: createentity
        description: Twilio Create an Entity
        call: verify-entities.createentity
        with:
          body: rest.body
        outputParameters:
        - type: object
          mapping: $.
  - type: mcp
    namespace: verify-entities-mcp
    port: 9090
    transport: http
    description: MCP adapter for Twilio Verify API — Entities. One tool per consumed operation, routed inline through this
      capability's consumes block.
    tools:
    - name: twilio-list-entities
      description: Twilio List Entities
      hints:
        readOnly: true
        destructive: false
        idempotent: true
      call: verify-entities.listentities
      outputParameters:
      - type: object
        mapping: $.
    - name: twilio-create-entity
      description: Twilio Create an Entity
      hints:
        readOnly: false
        destructive: false
        idempotent: false
      call: verify-entities.createentity
      with:
        body: tools.body
      outputParameters:
      - type: object
        mapping: $.
