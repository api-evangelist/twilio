          ConferenceSid: rest.ConferenceSid
        outputParameters:
        - type: object
          mapping: $.
      - method: POST
        name: updateconference
        description: Twilio Update a Conference
        call: voice-conferences.updateconference
        with:
          ConferenceSid: rest.ConferenceSid
          body: rest.body
        outputParameters:
        - type: object
          mapping: $.
