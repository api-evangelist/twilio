          description: The SID of the Execution resource to fetch.
          required: true
      - name: deleteexecution
        method: DELETE
        description: Delete the Execution and all Steps relating to it.
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
        inputParameters:
        - name: FlowSid
          in: path
          type: string
          description: The SID of the Flow with the Execution resources to delete.
          required: true
        - name: Sid
          in: path
          type: string
          description: The SID of the Execution resource to delete.
          required: true
      - name: updateexecution
        method: POST
        description: Update the status of an Execution to `ended`.
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
        inputParameters:
        - name: FlowSid
          in: path
          type: string
          description: The SID of the Flow with the Execution resources to update.
          required: true
        - name: Sid
          in: path
          type: string
          description: The SID of the Execution resource to update.
          required: true
        - name: body
          in: body
          type: object
          description: Request body (JSON).
          required: false
    - name: v2-Flows-Sid
      path: /v2/Flows/{Sid}
      operations:
      - name: updateflow
        method: POST
        description: Update a Flow.
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
        inputParameters:
        - name: Sid
          in: path
          type: string
          description: The SID of the Flow resource to fetch.
          required: true
        - name: body
          in: body
          type: object
          description: Request body (JSON).
          required: false
      - name: fetchflow
        method: GET
        description: Retrieve a specific Flow.
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
        inputParameters:
        - name: Sid
          in: path
          type: string
          description: The SID of the Flow resource to fetch.
          required: true
      - name: deleteflow
        method: DELETE
        description: Delete a specific Flow.
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
        inputParameters:
        - name: Sid
          in: path
          type: string
          description: The SID of the Flow resource to delete.
          required: true
