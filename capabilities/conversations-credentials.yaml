naftiko: 1.0.0-alpha2
info:
  label: Twilio - Conversations — Credentials
  description: 'Twilio - Conversations — Credentials. 5 operations. Lead operation: Credentials. Self-contained Naftiko capability
    covering one Twilio business surface.'
  tags:
  - Twilio
  - Credentials
  created: '2026-05-19'
  modified: '2026-05-19'
binds:
- namespace: env
  keys:
    TWILIO_API_KEY: TWILIO_API_KEY
capability:
  consumes:
  - type: http
    namespace: conversations-credentials
    baseUri: https://conversations.twilio.com
    description: Twilio - Conversations — Credentials business capability. Self-contained, no shared references.
    resources:
    - name: v1-Credentials
      path: /v1/Credentials
      operations:
      - name: createcredential
        method: POST
        description: Add a new push notification credential to your account
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
        inputParameters:
        - name: body
          in: body
          type: object
          description: Request body (JSON).
          required: false
      - name: listcredential
        method: GET
        description: Retrieve a list of all push notification credentials on your account
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
        inputParameters:
        - name: PageSize
          in: query
          type: integer
          description: How many resources to return in each list page. The default is 50, and the maximum is 1000.
        - name: Page
          in: query
          type: integer
          description: The page index. This value is simply for client state.
        - name: PageToken
          in: query
          type: string
          description: The page token. This is provided by the API.
    - name: v1-Credentials-Sid
      path: /v1/Credentials/{Sid}
      operations:
      - name: updatecredential
        method: POST
        description: Update an existing push notification credential on your account
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
        inputParameters:
        - name: Sid
          in: path
          type: string
          description: A 34 character string that uniquely identifies this resource.
          required: true
        - name: body
          in: body
          type: object
          description: Request body (JSON).
          required: false
      - name: deletecredential
        method: DELETE
        description: Remove a push notification credential from your account
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
        inputParameters:
        - name: Sid
          in: path
          type: string
          description: A 34 character string that uniquely identifies this resource.
          required: true
      - name: fetchcredential
        method: GET
        description: Fetch a push notification credential from your account
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
        inputParameters:
        - name: Sid
          in: path
          type: string
          description: A 34 character string that uniquely identifies this resource.
          required: true
    authentication:
      type: basic
      username: '{{env.TWILIO_USER}}'
      password: '{{env.TWILIO_PASS}}'
  exposes:
  - type: rest
    namespace: conversations-credentials-rest
    port: 8080
    description: REST adapter for Twilio - Conversations — Credentials. One Spectral-compliant resource per consumed operation,
      prefixed with /v1.
    resources:
    - path: /v1/v1/credentials
      name: v1-credentials
      description: REST surface for v1-Credentials.
      operations:
      - method: POST
        name: createcredential
        description: Add a new push notification credential to your account
        call: conversations-credentials.createcredential
        with:
          body: rest.body
        outputParameters:
        - type: object
          mapping: $.
      - method: GET
        name: listcredential
        description: Retrieve a list of all push notification credentials on your account
        call: conversations-credentials.listcredential
        with:
          PageSize: rest.PageSize
          Page: rest.Page
          PageToken: rest.PageToken
        outputParameters:
        - type: object
          mapping: $.
    - path: /v1/v1/credentials/{sid}
      name: v1-credentials-sid
      description: REST surface for v1-Credentials-Sid.
      operations:
      - method: POST
        name: updatecredential
        description: Update an existing push notification credential on your account
        call: conversations-credentials.updatecredential
        with:
          Sid: rest.Sid
          body: rest.body
        outputParameters:
        - type: object
          mapping: $.
      - method: DELETE
        name: deletecredential
        description: Remove a push notification credential from your account
        call: conversations-credentials.deletecredential
        with:
          Sid: rest.Sid
        outputParameters:
        - type: object
          mapping: $.
      - method: GET
        name: fetchcredential
        description: Fetch a push notification credential from your account
        call: conversations-credentials.fetchcredential
        with:
          Sid: rest.Sid
        outputParameters:
        - type: object
          mapping: $.
  - type: mcp
    namespace: conversations-credentials-mcp
    port: 9090
    transport: http
    description: MCP adapter for Twilio - Conversations — Credentials. One tool per consumed operation, routed inline through
      this capability's consumes block.
    tools:
    - name: add-new-push-notification-credential
      description: Add a new push notification credential to your account
      hints:
        readOnly: false
        destructive: false
        idempotent: false
      call: conversations-credentials.createcredential
      with:
        body: tools.body
      outputParameters:
      - type: object
        mapping: $.
    - name: retrieve-list-all-push-notification
      description: Retrieve a list of all push notification credentials on your account
      hints:
        readOnly: true
        destructive: false
        idempotent: true
      call: conversations-credentials.listcredential
      with:
        PageSize: tools.PageSize
        Page: tools.Page
        PageToken: tools.PageToken
      outputParameters:
      - type: object
        mapping: $.
    - name: update-existing-push-notification-credential
      description: Update an existing push notification credential on your account
      hints:
        readOnly: false
        destructive: false
        idempotent: false
      call: conversations-credentials.updatecredential
      with:
        Sid: tools.Sid
        body: tools.body
      outputParameters:
      - type: object
        mapping: $.
    - name: remove-push-notification-credential-your
      description: Remove a push notification credential from your account
      hints:
        readOnly: false
        destructive: true
        idempotent: true
      call: conversations-credentials.deletecredential
      with:
        Sid: tools.Sid
      outputParameters:
      - type: object
        mapping: $.
    - name: fetch-push-notification-credential-your
      description: Fetch a push notification credential from your account
      hints:
        readOnly: true
        destructive: false
        idempotent: true
      call: conversations-credentials.fetchcredential
      with:
        Sid: tools.Sid
      outputParameters:
      - type: object
        mapping: $.
