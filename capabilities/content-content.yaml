naftiko: 1.0.0-alpha2
info:
  label: Twilio - Content — Content
  description: 'Twilio - Content — Content. 4 operations. Lead operation: Content. Self-contained Naftiko capability covering
    one Twilio business surface.'
  tags:
  - Twilio
  - Content
  created: '2026-05-19'
  modified: '2026-05-19'
binds:
- namespace: env
  keys:
    TWILIO_API_KEY: TWILIO_API_KEY
capability:
  consumes:
  - type: http
    namespace: content-content
    baseUri: https://content.twilio.com
    description: Twilio - Content — Content business capability. Self-contained, no shared references.
    resources:
    - name: v1-Content
      path: /v1/Content
      operations:
      - name: listcontent
        method: GET
        description: Retrieve a list of Contents belonging to the account used to make the request
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
        inputParameters:
        - name: PageSize
          in: query
          type: integer
          description: How many resources to return in each list page. The default is 50, and the maximum is 1000.
        - name: Page
          in: query
          type: integer
          description: The page index. This value is simply for client state.
        - name: PageToken
          in: query
          type: string
          description: The page token. This is provided by the API.
    - name: v1-Content-Sid
      path: /v1/Content/{Sid}
      operations:
      - name: fetchcontent
        method: GET
        description: Fetch a Content resource by its unique Content Sid
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
        inputParameters:
        - name: Sid
          in: path
          type: string
          description: The Twilio-provided string that uniquely identifies the Content resource to fetch.
          required: true
      - name: deletecontent
        method: DELETE
        description: Deletes a Content resource
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
        inputParameters:
        - name: Sid
          in: path
          type: string
          description: The Twilio-provided string that uniquely identifies the Content resource to fetch.
          required: true
    - name: v1-Content-Sid-ApprovalRequests
      path: /v1/Content/{Sid}/ApprovalRequests
      operations:
      - name: fetchapprovalfetch
        method: GET
        description: Fetch a Content resource's approval status by its unique Content Sid
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
        inputParameters:
        - name: Sid
          in: path
          type: string
          description: The Twilio-provided string that uniquely identifies the Content resource whose approval information
            to fetch.
          required: true
    authentication:
      type: basic
      username: '{{env.TWILIO_USER}}'
      password: '{{env.TWILIO_PASS}}'
  exposes:
  - type: rest
    namespace: content-content-rest
    port: 8080
    description: REST adapter for Twilio - Content — Content. One Spectral-compliant resource per consumed operation, prefixed
      with /v1.
    resources:
    - path: /v1/v1/content
      name: v1-content
      description: REST surface for v1-Content.
      operations:
      - method: GET
        name: listcontent
        description: Retrieve a list of Contents belonging to the account used to make the request
        call: content-content.listcontent
        with:
          PageSize: rest.PageSize
          Page: rest.Page
          PageToken: rest.PageToken
        outputParameters:
        - type: object
          mapping: $.
    - path: /v1/v1/content/{sid}
      name: v1-content-sid
      description: REST surface for v1-Content-Sid.
      operations:
      - method: GET
        name: fetchcontent
        description: Fetch a Content resource by its unique Content Sid
        call: content-content.fetchcontent
        with:
          Sid: rest.Sid
        outputParameters:
        - type: object
          mapping: $.
      - method: DELETE
        name: deletecontent
        description: Deletes a Content resource
        call: content-content.deletecontent
        with:
          Sid: rest.Sid
        outputParameters:
        - type: object
          mapping: $.
    - path: /v1/v1/content/{sid}/approvalrequests
      name: v1-content-sid-approvalrequests
      description: REST surface for v1-Content-Sid-ApprovalRequests.
      operations:
      - method: GET
        name: fetchapprovalfetch
        description: Fetch a Content resource's approval status by its unique Content Sid
        call: content-content.fetchapprovalfetch
        with:
          Sid: rest.Sid
        outputParameters:
        - type: object
          mapping: $.
  - type: mcp
    namespace: content-content-mcp
    port: 9090
    transport: http
    description: MCP adapter for Twilio - Content — Content. One tool per consumed operation, routed inline through this capability's
      consumes block.
    tools:
    - name: retrieve-list-contents-belonging-account
      description: Retrieve a list of Contents belonging to the account used to make the request
      hints:
        readOnly: true
        destructive: false
        idempotent: true
      call: content-content.listcontent
      with:
        PageSize: tools.PageSize
        Page: tools.Page
        PageToken: tools.PageToken
      outputParameters:
      - type: object
        mapping: $.
    - name: fetch-content-resource-its-unique
      description: Fetch a Content resource by its unique Content Sid
      hints:
        readOnly: true
        destructive: false
        idempotent: true
      call: content-content.fetchcontent
      with:
        Sid: tools.Sid
      outputParameters:
      - type: object
        mapping: $.
    - name: deletes-content-resource
      description: Deletes a Content resource
      hints:
        readOnly: false
        destructive: true
        idempotent: true
      call: content-content.deletecontent
      with:
        Sid: tools.Sid
      outputParameters:
      - type: object
        mapping: $.
    - name: fetch-content-resource-s-approval-status
      description: Fetch a Content resource's approval status by its unique Content Sid
      hints:
        readOnly: true
        destructive: false
        idempotent: true
      call: content-content.fetchapprovalfetch
      with:
        Sid: tools.Sid
      outputParameters:
      - type: object
        mapping: $.
