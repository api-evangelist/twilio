      name: v1-settingsupdates
      description: REST surface for v1-SettingsUpdates.
      operations:
      - method: GET
        name: listsettingsupdate
        description: Retrieve a list of Settings Updates.
        call: super-sim-settingsupdates.listsettingsupdate
        with:
