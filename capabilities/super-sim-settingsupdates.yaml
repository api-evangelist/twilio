  - type: http
    namespace: super-sim-settingsupdates
    baseUri: https://supersim.twilio.com
    description: Twilio - Supersim — SettingsUpdates business capability. Self-contained, no shared references.
    resources:
    - name: v1-SettingsUpdates
      path: /v1/SettingsUpdates
      operations:
      - name: listsettingsupdate
        method: GET
        description: Retrieve a list of Settings Updates.
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
        inputParameters:
        - name: Sim
          in: query
          type: string
          description: Filter the Settings Updates by a Super SIM's SID or UniqueName.
        - name: Status
          in: query
          type: string
          description: Filter the Settings Updates by status. Can be `scheduled`, `in-progress`, `successful`, or `failed`.
        - name: PageSize
          in: query
          type: integer
          description: How many resources to return in each list page. The default is 50, and the maximum is 1000.
        - name: Page
          in: query
          type: integer
          description: The page index. This value is simply for client state.
        - name: PageToken
          in: query
          type: string
          description: The page token. This is provided by the API.
