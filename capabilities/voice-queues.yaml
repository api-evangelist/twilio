        name: fetchqueue
        description: Twilio Fetch a Queue
        call: voice-queues.fetchqueue
        with:
          QueueSid: rest.QueueSid
        outputParameters:
        - type: object
          mapping: $.
      - method: POST
        name: updatequeue
        description: Twilio Update a Queue
        call: voice-queues.updatequeue
        with:
          QueueSid: rest.QueueSid
          body: rest.body
        outputParameters:
        - type: object
          mapping: $.
      - method: DELETE
        name: deletequeue
        description: Twilio Delete a Queue
        call: voice-queues.deletequeue
        with:
          QueueSid: rest.QueueSid
        outputParameters:
        - type: object
          mapping: $.
  - type: mcp
