    port: 9090
    transport: http
    description: MCP adapter for Twilio Voice API — Queues. One tool per consumed operation, routed inline through this capability's
      consumes block.
    tools:
    - name: twilio-list-call-queues
      description: Twilio List Call Queues
      hints:
        readOnly: true
        destructive: false
        idempotent: true
      call: voice-queues.listqueues
      outputParameters:
      - type: object
        mapping: $.
    - name: twilio-create-call-queue
      description: Twilio Create a Call Queue
      hints:
        readOnly: false
        destructive: false
        idempotent: false
      call: voice-queues.createqueue
      with:
        body: tools.body
      outputParameters:
      - type: object
        mapping: $.
    - name: twilio-fetch-queue
      description: Twilio Fetch a Queue
      hints:
        readOnly: true
        destructive: false
        idempotent: true
      call: voice-queues.fetchqueue
      with:
        QueueSid: tools.QueueSid
      outputParameters:
      - type: object
        mapping: $.
    - name: twilio-update-queue
      description: Twilio Update a Queue
      hints:
        readOnly: false
        destructive: false
        idempotent: false
      call: voice-queues.updatequeue
      with:
        QueueSid: tools.QueueSid
        body: tools.body
      outputParameters:
      - type: object
        mapping: $.
    - name: twilio-delete-queue
      description: Twilio Delete a Queue
      hints:
        readOnly: false
        destructive: true
        idempotent: true
      call: voice-queues.deletequeue
      with:
        QueueSid: tools.QueueSid
      outputParameters:
      - type: object
        mapping: $.
