naftiko: 1.0.0-alpha2
info:
  label: Twilio Voice API — Queues
  description: 'Twilio Voice API — Queues. 5 operations. Lead operation: Twilio List Call Queues. Self-contained Naftiko capability
    covering one Twilio business surface.'
  tags:
  - Twilio
  - Queues
  created: '2026-05-19'
  modified: '2026-05-19'
binds:
- namespace: env
  keys:
    TWILIO_API_KEY: TWILIO_API_KEY
capability:
