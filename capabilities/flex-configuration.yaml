naftiko: 1.0.0-alpha2
info:
  label: Twilio Flex API — Configuration
  description: 'Twilio Flex API — Configuration. 2 operations. Lead operation: Twilio Fetch Flex Configuration. Self-contained
    Naftiko capability covering one Twilio business surface.'
  tags:
  - Twilio
  - Configuration
  created: '2026-05-19'
  modified: '2026-05-19'
binds:
- namespace: env
  keys:
    TWILIO_API_KEY: TWILIO_API_KEY
capability:
  consumes:
  - type: http
    namespace: flex-configuration
    baseUri: https://flex-api.twilio.com/v1
    description: Twilio Flex API — Configuration business capability. Self-contained, no shared references.
    resources:
    - name: Configuration
      path: /Configuration
      operations:
      - name: fetchconfiguration
        method: GET
        description: Twilio Fetch Flex Configuration
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
        inputParameters:
        - name: UiVersion
          in: query
          type: string
          description: The Flex UI version to fetch configuration for
      - name: updateconfiguration
        method: POST
        description: Twilio Update Flex Configuration
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
        inputParameters:
        - name: body
          in: body
          type: object
          description: Request body (JSON).
          required: true
    authentication:
      type: basic
      username: '{{env.TWILIO_USER}}'
      password: '{{env.TWILIO_PASS}}'
  exposes:
  - type: rest
    namespace: flex-configuration-rest
    port: 8080
    description: REST adapter for Twilio Flex API — Configuration. One Spectral-compliant resource per consumed operation,
      prefixed with /v1.
    resources:
    - path: /v1/configuration
      name: configuration
      description: REST surface for Configuration.
      operations:
      - method: GET
        name: fetchconfiguration
        description: Twilio Fetch Flex Configuration
        call: flex-configuration.fetchconfiguration
        with:
          UiVersion: rest.UiVersion
        outputParameters:
        - type: object
          mapping: $.
      - method: POST
        name: updateconfiguration
        description: Twilio Update Flex Configuration
        call: flex-configuration.updateconfiguration
        with:
          body: rest.body
        outputParameters:
        - type: object
          mapping: $.
  - type: mcp
    namespace: flex-configuration-mcp
    port: 9090
    transport: http
    description: MCP adapter for Twilio Flex API — Configuration. One tool per consumed operation, routed inline through this
      capability's consumes block.
    tools:
    - name: twilio-fetch-flex-configuration
      description: Twilio Fetch Flex Configuration
      hints:
        readOnly: true
        destructive: false
        idempotent: true
      call: flex-configuration.fetchconfiguration
      with:
        UiVersion: tools.UiVersion
      outputParameters:
      - type: object
        mapping: $.
    - name: twilio-update-flex-configuration
      description: Twilio Update Flex Configuration
      hints:
        readOnly: false
        destructive: false
        idempotent: false
      call: flex-configuration.updateconfiguration
      with:
        body: tools.body
      outputParameters:
      - type: object
        mapping: $.
