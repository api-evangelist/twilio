naftiko: 1.0.0-alpha2
info:
  label: Twilio - Conversations — Roles
  description: 'Twilio - Conversations — Roles. 5 operations. Lead operation: Roles. Self-contained Naftiko capability covering
    one Twilio business surface.'
  tags:
  - Twilio
  - Roles
  created: '2026-05-19'
  modified: '2026-05-19'
binds:
- namespace: env
  keys:
    TWILIO_API_KEY: TWILIO_API_KEY
capability:
  consumes:
  - type: http
    namespace: conversations-roles
    baseUri: https://conversations.twilio.com
    description: Twilio - Conversations — Roles business capability. Self-contained, no shared references.
    resources:
    - name: v1-Roles
      path: /v1/Roles
      operations:
      - name: createrole
        method: POST
        description: Create a new user role in your account's default service
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
        inputParameters:
        - name: body
          in: body
          type: object
          description: Request body (JSON).
          required: false
      - name: listrole
        method: GET
        description: Retrieve a list of all user roles in your account's default service
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
        inputParameters:
        - name: PageSize
          in: query
          type: integer
          description: How many resources to return in each list page. The default is 50, and the maximum is 1000.
        - name: Page
          in: query
          type: integer
          description: The page index. This value is simply for client state.
        - name: PageToken
          in: query
          type: string
          description: The page token. This is provided by the API.
    - name: v1-Roles-Sid
      path: /v1/Roles/{Sid}
      operations:
      - name: updaterole
        method: POST
        description: Update an existing user role in your account's default service
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
        inputParameters:
        - name: Sid
          in: path
          type: string
          description: The SID of the Role resource to update.
          required: true
        - name: body
          in: body
          type: object
          description: Request body (JSON).
          required: false
      - name: deleterole
        method: DELETE
        description: Remove a user role from your account's default service
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
        inputParameters:
        - name: Sid
          in: path
          type: string
          description: The SID of the Role resource to delete.
          required: true
      - name: fetchrole
        method: GET
        description: Fetch a user role from your account's default service
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
        inputParameters:
        - name: Sid
          in: path
          type: string
          description: The SID of the Role resource to fetch.
          required: true
    authentication:
      type: basic
      username: '{{env.TWILIO_USER}}'
      password: '{{env.TWILIO_PASS}}'
  exposes:
  - type: rest
    namespace: conversations-roles-rest
    port: 8080
    description: REST adapter for Twilio - Conversations — Roles. One Spectral-compliant resource per consumed operation,
      prefixed with /v1.
    resources:
    - path: /v1/v1/roles
      name: v1-roles
      description: REST surface for v1-Roles.
      operations:
      - method: POST
        name: createrole
        description: Create a new user role in your account's default service
        call: conversations-roles.createrole
        with:
          body: rest.body
        outputParameters:
        - type: object
          mapping: $.
      - method: GET
        name: listrole
        description: Retrieve a list of all user roles in your account's default service
        call: conversations-roles.listrole
        with:
          PageSize: rest.PageSize
          Page: rest.Page
          PageToken: rest.PageToken
        outputParameters:
        - type: object
          mapping: $.
    - path: /v1/v1/roles/{sid}
      name: v1-roles-sid
      description: REST surface for v1-Roles-Sid.
      operations:
      - method: POST
        name: updaterole
        description: Update an existing user role in your account's default service
        call: conversations-roles.updaterole
        with:
          Sid: rest.Sid
          body: rest.body
        outputParameters:
        - type: object
          mapping: $.
      - method: DELETE
        name: deleterole
        description: Remove a user role from your account's default service
        call: conversations-roles.deleterole
        with:
          Sid: rest.Sid
        outputParameters:
        - type: object
          mapping: $.
      - method: GET
        name: fetchrole
        description: Fetch a user role from your account's default service
        call: conversations-roles.fetchrole
        with:
          Sid: rest.Sid
        outputParameters:
        - type: object
          mapping: $.
  - type: mcp
    namespace: conversations-roles-mcp
    port: 9090
    transport: http
    description: MCP adapter for Twilio - Conversations — Roles. One tool per consumed operation, routed inline through this
      capability's consumes block.
    tools:
    - name: create-new-user-role-your
      description: Create a new user role in your account's default service
      hints:
        readOnly: false
        destructive: false
        idempotent: false
      call: conversations-roles.createrole
      with:
        body: tools.body
      outputParameters:
      - type: object
        mapping: $.
    - name: retrieve-list-all-user-roles
      description: Retrieve a list of all user roles in your account's default service
      hints:
        readOnly: true
        destructive: false
        idempotent: true
      call: conversations-roles.listrole
      with:
        PageSize: tools.PageSize
        Page: tools.Page
        PageToken: tools.PageToken
      outputParameters:
      - type: object
        mapping: $.
    - name: update-existing-user-role-your
      description: Update an existing user role in your account's default service
      hints:
        readOnly: false
        destructive: false
        idempotent: false
      call: conversations-roles.updaterole
      with:
        Sid: tools.Sid
        body: tools.body
      outputParameters:
      - type: object
        mapping: $.
    - name: remove-user-role-your-account-s
      description: Remove a user role from your account's default service
      hints:
        readOnly: false
        destructive: true
        idempotent: true
      call: conversations-roles.deleterole
      with:
        Sid: tools.Sid
      outputParameters:
      - type: object
        mapping: $.
    - name: fetch-user-role-your-account-s
      description: Fetch a user role from your account's default service
      hints:
        readOnly: true
        destructive: false
        idempotent: true
      call: conversations-roles.fetchrole
      with:
        Sid: tools.Sid
      outputParameters:
      - type: object
        mapping: $.
