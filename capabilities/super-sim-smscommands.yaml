naftiko: 1.0.0-alpha2
info:
  label: Twilio - Supersim — SmsCommands
  description: 'Twilio - Supersim — SmsCommands. 3 operations. Lead operation: SmsCommands. Self-contained Naftiko capability
    covering one Twilio business surface.'
  tags:
  - Twilio
  - SmsCommands
  created: '2026-05-19'
  modified: '2026-05-19'
binds:
- namespace: env
  keys:
    TWILIO_API_KEY: TWILIO_API_KEY
capability:
  consumes:
  - type: http
    namespace: super-sim-smscommands
    baseUri: https://supersim.twilio.com
    description: Twilio - Supersim — SmsCommands business capability. Self-contained, no shared references.
    resources:
    - name: v1-SmsCommands
      path: /v1/SmsCommands
      operations:
      - name: createsmscommand
        method: POST
        description: Send SMS Command to a Sim.
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
        inputParameters:
        - name: body
          in: body
          type: object
          description: Request body (JSON).
          required: false
      - name: listsmscommand
        method: GET
        description: Retrieve a list of SMS Commands from your account.
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
        inputParameters:
        - name: Sim
          in: query
          type: string
          description: The SID or unique name of the Sim resource that SMS Command was sent to or from.
        - name: Status
          in: query
          type: string
          description: 'The status of the SMS Command. Can be: `queued`, `sent`, `delivered`, `received` or `failed`. See
            the [SMS Command Status Values](https://www.twilio.com/docs/io'
        - name: Direction
          in: query
          type: string
          description: The direction of the SMS Command. Can be `to_sim` or `from_sim`. The value of `to_sim` is synonymous
            with the term `mobile terminated`, and `from_sim` is synony
        - name: PageSize
          in: query
          type: integer
          description: How many resources to return in each list page. The default is 50, and the maximum is 1000.
        - name: Page
          in: query
          type: integer
          description: The page index. This value is simply for client state.
        - name: PageToken
          in: query
          type: string
          description: The page token. This is provided by the API.
    - name: v1-SmsCommands-Sid
      path: /v1/SmsCommands/{Sid}
      operations:
      - name: fetchsmscommand
        method: GET
        description: Fetch SMS Command instance from your account.
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
        inputParameters:
        - name: Sid
          in: path
          type: string
          description: The SID of the SMS Command resource to fetch.
          required: true
    authentication:
      type: basic
      username: '{{env.TWILIO_USER}}'
      password: '{{env.TWILIO_PASS}}'
  exposes:
  - type: rest
    namespace: super-sim-smscommands-rest
    port: 8080
    description: REST adapter for Twilio - Supersim — SmsCommands. One Spectral-compliant resource per consumed operation,
      prefixed with /v1.
    resources:
    - path: /v1/v1/smscommands
      name: v1-smscommands
      description: REST surface for v1-SmsCommands.
      operations:
      - method: POST
        name: createsmscommand
        description: Send SMS Command to a Sim.
        call: super-sim-smscommands.createsmscommand
        with:
          body: rest.body
        outputParameters:
        - type: object
          mapping: $.
      - method: GET
        name: listsmscommand
        description: Retrieve a list of SMS Commands from your account.
        call: super-sim-smscommands.listsmscommand
        with:
          Sim: rest.Sim
          Status: rest.Status
          Direction: rest.Direction
          PageSize: rest.PageSize
          Page: rest.Page
          PageToken: rest.PageToken
        outputParameters:
        - type: object
          mapping: $.
    - path: /v1/v1/smscommands/{sid}
      name: v1-smscommands-sid
      description: REST surface for v1-SmsCommands-Sid.
      operations:
      - method: GET
        name: fetchsmscommand
        description: Fetch SMS Command instance from your account.
        call: super-sim-smscommands.fetchsmscommand
        with:
          Sid: rest.Sid
        outputParameters:
        - type: object
          mapping: $.
  - type: mcp
    namespace: super-sim-smscommands-mcp
    port: 9090
    transport: http
    description: MCP adapter for Twilio - Supersim — SmsCommands. One tool per consumed operation, routed inline through this
      capability's consumes block.
    tools:
    - name: send-sms-command-sim
      description: Send SMS Command to a Sim.
      hints:
        readOnly: false
        destructive: false
        idempotent: false
      call: super-sim-smscommands.createsmscommand
      with:
        body: tools.body
      outputParameters:
      - type: object
        mapping: $.
    - name: retrieve-list-sms-commands-your
      description: Retrieve a list of SMS Commands from your account.
      hints:
        readOnly: true
        destructive: false
        idempotent: true
      call: super-sim-smscommands.listsmscommand
      with:
        Sim: tools.Sim
        Status: tools.Status
        Direction: tools.Direction
        PageSize: tools.PageSize
        Page: tools.Page
        PageToken: tools.PageToken
      outputParameters:
      - type: object
        mapping: $.
    - name: fetch-sms-command-instance-your
      description: Fetch SMS Command instance from your account.
      hints:
        readOnly: true
        destructive: false
        idempotent: true
      call: super-sim-smscommands.fetchsmscommand
      with:
        Sid: tools.Sid
      outputParameters:
      - type: object
        mapping: $.
