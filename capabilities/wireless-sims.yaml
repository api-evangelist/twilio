        call: wireless-sims.updatesim
        with:
          Sid: rest.Sid
          body: rest.body
        outputParameters:
        - type: object
          mapping: $.
      - method: DELETE
        name: deletesim
        description: Delete a Sim resource on your Account.
        call: wireless-sims.deletesim
        with:
          Sid: rest.Sid
        outputParameters:
        - type: object
          mapping: $.
    - path: /v1/v1/sims/{simsid}/datasessions
      name: v1-sims-simsid-datasessions
      description: REST surface for v1-Sims-SimSid-DataSessions.
      operations:
      - method: GET
        name: listdatasession
        description: listdatasession
        call: wireless-sims.listdatasession
        with:
          SimSid: rest.SimSid
          PageSize: rest.PageSize
          Page: rest.Page
          PageToken: rest.PageToken
        outputParameters:
        - type: object
          mapping: $.
    - path: /v1/v1/sims/{simsid}/usagerecords
      name: v1-sims-simsid-usagerecords
      description: REST surface for v1-Sims-SimSid-UsageRecords.
      operations:
      - method: GET
        name: listusagerecord
