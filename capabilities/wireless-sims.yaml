        readOnly: true
        destructive: false
        idempotent: true
      call: wireless-sims.listdatasession
      with:
        SimSid: tools.SimSid
        PageSize: tools.PageSize
        Page: tools.Page
        PageToken: tools.PageToken
      outputParameters:
      - type: object
        mapping: $.
    - name: listusagerecord
      description: listusagerecord
      hints:
        readOnly: true
        destructive: false
        idempotent: true
      call: wireless-sims.listusagerecord
      with:
        SimSid: tools.SimSid
        End: tools.End
        Start: tools.Start
        Granularity: tools.Granularity
        PageSize: tools.PageSize
        Page: tools.Page
        PageToken: tools.PageToken
      outputParameters:
      - type: object
