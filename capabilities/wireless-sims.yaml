        destructive: false
        idempotent: true
      call: wireless-sims.fetchsim
      with:
        Sid: tools.Sid
      outputParameters:
      - type: object
        mapping: $.
    - name: updates-given-properties-sim-resource
      description: Updates the given properties of a Sim resource on your Account.
      hints:
        readOnly: false
        destructive: false
        idempotent: false
      call: wireless-sims.updatesim
      with:
        Sid: tools.Sid
        body: tools.body
      outputParameters:
      - type: object
