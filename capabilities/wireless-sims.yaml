naftiko: 1.0.0-alpha2
info:
  label: Twilio - Wireless — Sims
  description: 'Twilio - Wireless — Sims. 6 operations. Lead operation: Sims. Self-contained Naftiko capability covering one
    Twilio business surface.'
  tags:
  - Twilio
  - Sims
  created: '2026-05-19'
  modified: '2026-05-19'
binds:
- namespace: env
  keys:
    TWILIO_API_KEY: TWILIO_API_KEY
capability:
  consumes:
  - type: http
    namespace: wireless-sims
    baseUri: https://wireless.twilio.com
    description: Twilio - Wireless — Sims business capability. Self-contained, no shared references.
    resources:
    - name: v1-Sims
      path: /v1/Sims
      operations:
      - name: listsim
        method: GET
        description: Retrieve a list of Sim resources on your Account.
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
        inputParameters:
        - name: Status
          in: query
          type: string
          description: Only return Sim resources with this status.
        - name: Iccid
          in: query
          type: string
          description: Only return Sim resources with this ICCID. This will return a list with a maximum size of 1.
        - name: RatePlan
          in: query
          type: string
          description: The SID or unique name of a [RatePlan resource](https://www.twilio.com/docs/iot/wireless/api/rateplan-resource).
            Only return Sim resources assigned to this Rate
        - name: EId
          in: query
          type: string
          description: Deprecated.
        - name: SimRegistrationCode
          in: query
          type: string
          description: Only return Sim resources with this registration code. This will return a list with a maximum size
            of 1.
        - name: PageSize
          in: query
          type: integer
          description: How many resources to return in each list page. The default is 50, and the maximum is 1000.
        - name: Page
          in: query
          type: integer
          description: The page index. This value is simply for client state.
        - name: PageToken
          in: query
          type: string
          description: The page token. This is provided by the API.
    - name: v1-Sims-Sid
      path: /v1/Sims/{Sid}
      operations:
      - name: fetchsim
        method: GET
        description: Fetch a Sim resource on your Account.
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
        inputParameters:
        - name: Sid
          in: path
          type: string
          description: The SID or the `unique_name` of the Sim resource to fetch.
          required: true
      - name: updatesim
        method: POST
        description: Updates the given properties of a Sim resource on your Account.
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
        inputParameters:
        - name: Sid
          in: path
          type: string
          description: The SID or the `unique_name` of the Sim resource to update.
          required: true
        - name: body
          in: body
          type: object
          description: Request body (JSON).
          required: false
      - name: deletesim
        method: DELETE
        description: Delete a Sim resource on your Account.
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
        inputParameters:
        - name: Sid
          in: path
          type: string
          description: The SID or the `unique_name` of the Sim resource to delete.
          required: true
    - name: v1-Sims-SimSid-DataSessions
      path: /v1/Sims/{SimSid}/DataSessions
      operations:
      - name: listdatasession
        method: GET
        description: ''
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
        inputParameters:
        - name: SimSid
          in: path
          type: string
          description: The SID of the [Sim resource](https://www.twilio.com/docs/iot/wireless/api/sim-resource) with the Data
            Sessions to read.
          required: true
        - name: PageSize
          in: query
          type: integer
          description: How many resources to return in each list page. The default is 50, and the maximum is 1000.
        - name: Page
          in: query
          type: integer
          description: The page index. This value is simply for client state.
        - name: PageToken
          in: query
          type: string
          description: The page token. This is provided by the API.
    - name: v1-Sims-SimSid-UsageRecords
      path: /v1/Sims/{SimSid}/UsageRecords
      operations:
      - name: listusagerecord
        method: GET
        description: ''
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
        inputParameters:
        - name: SimSid
          in: path
          type: string
          description: The SID of the [Sim resource](https://www.twilio.com/docs/iot/wireless/api/sim-resource)  to read the
            usage from.
          required: true
        - name: End
          in: query
          type: string
          description: Only include usage that occurred on or before this date, specified in [ISO 8601](https://www.iso.org/iso-8601-date-and-time-format.html).
            The default is the cur
        - name: Start
          in: query
          type: string
          description: 'Only include usage that has occurred on or after this date, specified in [ISO 8601](https://www.iso.org/iso-8601-date-and-time-format.html).
            The default is one '
        - name: Granularity
          in: query
          type: string
          description: 'How to summarize the usage by time. Can be: `daily`, `hourly`, or `all`. The default is `all`. A value
            of `all` returns one Usage Record that describes the usag'
        - name: PageSize
          in: query
          type: integer
          description: How many resources to return in each list page. The default is 50, and the maximum is 1000.
        - name: Page
          in: query
          type: integer
          description: The page index. This value is simply for client state.
        - name: PageToken
          in: query
          type: string
          description: The page token. This is provided by the API.
    authentication:
      type: basic
      username: '{{env.TWILIO_USER}}'
      password: '{{env.TWILIO_PASS}}'
  exposes:
  - type: rest
    namespace: wireless-sims-rest
    port: 8080
    description: REST adapter for Twilio - Wireless — Sims. One Spectral-compliant resource per consumed operation, prefixed
      with /v1.
    resources:
    - path: /v1/v1/sims
      name: v1-sims
      description: REST surface for v1-Sims.
      operations:
      - method: GET
        name: listsim
        description: Retrieve a list of Sim resources on your Account.
        call: wireless-sims.listsim
        with:
          Status: rest.Status
          Iccid: rest.Iccid
          RatePlan: rest.RatePlan
          EId: rest.EId
          SimRegistrationCode: rest.SimRegistrationCode
          PageSize: rest.PageSize
          Page: rest.Page
          PageToken: rest.PageToken
        outputParameters:
        - type: object
          mapping: $.
    - path: /v1/v1/sims/{sid}
