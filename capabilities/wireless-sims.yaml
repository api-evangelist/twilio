        call: wireless-sims.listusagerecord
        with:
          SimSid: rest.SimSid
          End: rest.End
          Start: rest.Start
          Granularity: rest.Granularity
          PageSize: rest.PageSize
          Page: rest.Page
          PageToken: rest.PageToken
        outputParameters:
        - type: object
          mapping: $.
  - type: mcp
    namespace: wireless-sims-mcp
    port: 9090
    transport: http
    description: MCP adapter for Twilio - Wireless — Sims. One tool per consumed operation, routed inline through this capability's
      consumes block.
    tools:
    - name: retrieve-list-sim-resources-your
