naftiko: 1.0.0-alpha2
info:
  label: Twilio - Microvisor — Secrets
  description: 'Twilio - Microvisor — Secrets. 5 operations. Lead operation: Secrets. Self-contained Naftiko capability covering
    one Twilio business surface.'
  tags:
  - Twilio
  - Secrets
  created: '2026-05-19'
  modified: '2026-05-19'
binds:
- namespace: env
  keys:
    TWILIO_API_KEY: TWILIO_API_KEY
capability:
  consumes:
  - type: http
    namespace: microvisor-secrets
    baseUri: https://microvisor.twilio.com
    description: Twilio - Microvisor — Secrets business capability. Self-contained, no shared references.
    resources:
    - name: v1-Secrets
      path: /v1/Secrets
      operations:
      - name: listaccountsecret
        method: GET
        description: Retrieve a list of all Secrets for an Account.
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
        inputParameters:
        - name: PageSize
          in: query
          type: integer
          description: How many resources to return in each list page. The default is 50, and the maximum is 1000.
        - name: Page
          in: query
          type: integer
          description: The page index. This value is simply for client state.
        - name: PageToken
          in: query
          type: string
          description: The page token. This is provided by the API.
      - name: createaccountsecret
        method: POST
        description: Create a secret for an Account.
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
        inputParameters:
        - name: body
          in: body
          type: object
          description: Request body (JSON).
          required: false
    - name: v1-Secrets-Key
      path: /v1/Secrets/{Key}
      operations:
      - name: fetchaccountsecret
        method: GET
        description: Retrieve a Secret for an Account.
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
        inputParameters:
        - name: Key
          in: path
          type: string
          description: The secret key; up to 100 characters.
          required: true
      - name: updateaccountsecret
        method: POST
        description: Update a secret for an Account.
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
        inputParameters:
        - name: Key
          in: path
          type: string
          description: The secret key; up to 100 characters.
          required: true
        - name: body
          in: body
          type: object
          description: Request body (JSON).
          required: false
      - name: deleteaccountsecret
        method: DELETE
        description: Delete a secret for an Account.
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
        inputParameters:
        - name: Key
          in: path
          type: string
          description: The secret key; up to 100 characters.
          required: true
    authentication:
      type: basic
      username: '{{env.TWILIO_USER}}'
      password: '{{env.TWILIO_PASS}}'
  exposes:
  - type: rest
    namespace: microvisor-secrets-rest
    port: 8080
    description: REST adapter for Twilio - Microvisor — Secrets. One Spectral-compliant resource per consumed operation, prefixed
      with /v1.
    resources:
    - path: /v1/v1/secrets
      name: v1-secrets
      description: REST surface for v1-Secrets.
      operations:
      - method: GET
        name: listaccountsecret
        description: Retrieve a list of all Secrets for an Account.
        call: microvisor-secrets.listaccountsecret
        with:
          PageSize: rest.PageSize
          Page: rest.Page
          PageToken: rest.PageToken
        outputParameters:
        - type: object
          mapping: $.
      - method: POST
        name: createaccountsecret
        description: Create a secret for an Account.
        call: microvisor-secrets.createaccountsecret
        with:
          body: rest.body
        outputParameters:
        - type: object
          mapping: $.
    - path: /v1/v1/secrets/{key}
      name: v1-secrets-key
      description: REST surface for v1-Secrets-Key.
      operations:
      - method: GET
        name: fetchaccountsecret
        description: Retrieve a Secret for an Account.
        call: microvisor-secrets.fetchaccountsecret
        with:
          Key: rest.Key
        outputParameters:
        - type: object
          mapping: $.
      - method: POST
        name: updateaccountsecret
        description: Update a secret for an Account.
        call: microvisor-secrets.updateaccountsecret
        with:
          Key: rest.Key
          body: rest.body
        outputParameters:
        - type: object
          mapping: $.
      - method: DELETE
        name: deleteaccountsecret
        description: Delete a secret for an Account.
        call: microvisor-secrets.deleteaccountsecret
        with:
          Key: rest.Key
        outputParameters:
        - type: object
          mapping: $.
  - type: mcp
    namespace: microvisor-secrets-mcp
    port: 9090
    transport: http
    description: MCP adapter for Twilio - Microvisor — Secrets. One tool per consumed operation, routed inline through this
      capability's consumes block.
    tools:
    - name: retrieve-list-all-secrets-account
      description: Retrieve a list of all Secrets for an Account.
      hints:
        readOnly: true
        destructive: false
        idempotent: true
      call: microvisor-secrets.listaccountsecret
      with:
        PageSize: tools.PageSize
        Page: tools.Page
        PageToken: tools.PageToken
      outputParameters:
      - type: object
        mapping: $.
    - name: create-secret-account
      description: Create a secret for an Account.
      hints:
        readOnly: false
        destructive: false
        idempotent: false
      call: microvisor-secrets.createaccountsecret
      with:
        body: tools.body
      outputParameters:
      - type: object
        mapping: $.
    - name: retrieve-secret-account
      description: Retrieve a Secret for an Account.
      hints:
        readOnly: true
        destructive: false
        idempotent: true
      call: microvisor-secrets.fetchaccountsecret
      with:
        Key: tools.Key
      outputParameters:
      - type: object
        mapping: $.
    - name: update-secret-account
      description: Update a secret for an Account.
      hints:
        readOnly: false
        destructive: false
        idempotent: false
      call: microvisor-secrets.updateaccountsecret
      with:
        Key: tools.Key
        body: tools.body
      outputParameters:
      - type: object
        mapping: $.
    - name: delete-secret-account
      description: Delete a secret for an Account.
      hints:
        readOnly: false
        destructive: true
        idempotent: true
      call: microvisor-secrets.deleteaccountsecret
      with:
        Key: tools.Key
      outputParameters:
      - type: object
        mapping: $.
