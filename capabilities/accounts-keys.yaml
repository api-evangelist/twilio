    port: 9090
    transport: http
    description: MCP adapter for Twilio Accounts API — Keys. One tool per consumed operation, routed inline through this capability's
      consumes block.
    tools:
    - name: twilio-list-api-keys
      description: Twilio List Api Keys
      hints:
        readOnly: true
        destructive: false
        idempotent: true
      call: accounts-keys.listkeys
      outputParameters:
      - type: object
        mapping: $.
    - name: twilio-create-api-key
      description: Twilio Create an Api Key
      hints:
        readOnly: false
        destructive: false
        idempotent: false
      call: accounts-keys.createkey
      with:
        body: tools.body
      outputParameters:
      - type: object
        mapping: $.
    - name: twilio-fetch-api-key
      description: Twilio Fetch an Api Key
      hints:
        readOnly: true
        destructive: false
        idempotent: true
      call: accounts-keys.fetchkey
      with:
        KeySid: tools.KeySid
      outputParameters:
      - type: object
        mapping: $.
    - name: twilio-update-api-key
      description: Twilio Update an Api Key
      hints:
        readOnly: false
        destructive: false
        idempotent: false
      call: accounts-keys.updatekey
      with:
        KeySid: tools.KeySid
        body: tools.body
      outputParameters:
      - type: object
        mapping: $.
    - name: twilio-delete-api-key
      description: Twilio Delete an Api Key
      hints:
        readOnly: false
        destructive: true
        idempotent: true
      call: accounts-keys.deletekey
      with:
        KeySid: tools.KeySid
      outputParameters:
      - type: object
        mapping: $.
