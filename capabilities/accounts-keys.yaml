    namespace: accounts-keys
    baseUri: https://api.twilio.com/2010-04-01
    description: Twilio Accounts API — Keys business capability. Self-contained, no shared references.
    resources:
    - name: Accounts-AccountSid-Keys.json
      path: /Accounts/{AccountSid}/Keys.json
      operations:
      - name: listkeys
        method: GET
        description: Twilio List Api Keys
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
      - name: createkey
        method: POST
        description: Twilio Create an Api Key
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
        inputParameters:
        - name: body
          in: body
          type: object
          description: Request body (JSON).
          required: false
    - name: Accounts-AccountSid-Keys-KeySid}.json
      path: /Accounts/{AccountSid}/Keys/{KeySid}.json
      operations:
      - name: fetchkey
        method: GET
        description: Twilio Fetch an Api Key
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
        inputParameters:
        - name: KeySid
          in: path
          type: string
          required: true
      - name: updatekey
        method: POST
        description: Twilio Update an Api Key
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
        inputParameters:
        - name: KeySid
          in: path
          type: string
          required: true
        - name: body
          in: body
          type: object
          description: Request body (JSON).
          required: false
      - name: deletekey
        method: DELETE
        description: Twilio Delete an Api Key
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
        inputParameters:
        - name: KeySid
          in: path
          type: string
          required: true
    authentication:
      type: basic
      username: '{{env.TWILIO_USER}}'
      password: '{{env.TWILIO_PASS}}'
  exposes:
  - type: rest
    namespace: accounts-keys-rest
    port: 8080
    description: REST adapter for Twilio Accounts API — Keys. One Spectral-compliant resource per consumed operation, prefixed
      with /v1.
    resources:
    - path: /v1/accounts/{accountsid}/keys-json
      name: accounts-accountsid-keys-json
      description: REST surface for Accounts-AccountSid-Keys.json.
      operations:
      - method: GET
        name: listkeys
        description: Twilio List Api Keys
        call: accounts-keys.listkeys
        outputParameters:
        - type: object
          mapping: $.
      - method: POST
        name: createkey
        description: Twilio Create an Api Key
        call: accounts-keys.createkey
        with:
          body: rest.body
        outputParameters:
        - type: object
          mapping: $.
    - path: /v1/accounts/{accountsid}/keys/keysid-json
      name: accounts-accountsid-keys-keysid-json
      description: REST surface for Accounts-AccountSid-Keys-KeySid}.json.
      operations:
      - method: GET
        name: fetchkey
        description: Twilio Fetch an Api Key
        call: accounts-keys.fetchkey
        with:
          KeySid: rest.KeySid
        outputParameters:
        - type: object
          mapping: $.
      - method: POST
        name: updatekey
        description: Twilio Update an Api Key
        call: accounts-keys.updatekey
        with:
          KeySid: rest.KeySid
          body: rest.body
        outputParameters:
        - type: object
          mapping: $.
      - method: DELETE
        name: deletekey
        description: Twilio Delete an Api Key
        call: accounts-keys.deletekey
        with:
          KeySid: rest.KeySid
        outputParameters:
        - type: object
          mapping: $.
  - type: mcp
