    namespace: events-sinks-rest
    port: 8080
    description: REST adapter for Twilio - Events — Sinks. One Spectral-compliant resource per consumed operation, prefixed
      with /v1.
    resources:
    - path: /v1/v1/sinks
      name: v1-sinks
      description: REST surface for v1-Sinks.
      operations:
