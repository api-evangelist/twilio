arazzo: 1.0.1
info:
  title: Send a Twilio SMS for a Shopify order
  summary: Read a Shopify order and text an order confirmation via Twilio SMS.
  description: >-
    Retrieve a single Shopify order by ID, then send an order-confirmation SMS
    through Twilio to the customer's phone number. This wires Shopify's Admin
    REST order lookup to Twilio's Programmable Messaging so a shop can notify
    buyers the moment an order is placed.
  version: 1.0.0
sourceDescriptions:
  - name: shopify
    url: https://raw.githubusercontent.com/api-evangelist/shopify/refs/heads/main/openapi/shopify-admin-rest-api-openapi.yml
    type: openapi
  - name: twilio
    url: https://raw.githubusercontent.com/api-evangelist/twilio/refs/heads/main/openapi/twilio-messaging-openapi.yml
    type: openapi
workflows:
  - workflowId: twilio-shopify-order-confirmation-sms
    summary: Send an order-confirmation SMS from a Shopify order.
    description: >-
      Read a Shopify order by ID to obtain the customer's phone number and order
      total, then send a confirmation SMS through Twilio to that number.
    inputs:
      type: object
      required:
        - order_id
        - AccountSid
        - From
      properties:
        order_id:
          type: integer
          description: The Shopify order ID to confirm.
        AccountSid:
          type: string
          description: The Twilio Account SID that owns the sending number.
        From:
          type: string
          description: Twilio phone number, short code, or alphanumeric sender ID.
        To:
          type: string
          description: >-
            Override recipient phone number in E.164 format. Defaults to the
            phone number on the Shopify order.
    steps:
      - stepId: get-shopify-order
        description: Retrieve the Shopify order to confirm.
        operationId: $sourceDescriptions.shopify.getOrder
        parameters:
          - name: order_id
            in: path
            value: $inputs.order_id
        successCriteria:
          - condition: $statusCode == 200
        outputs:
          orderId: $response.body#/order/id
          orderName: $response.body#/order/name
          phone: $response.body#/order/phone
          totalPrice: $response.body#/order/total_price
      - stepId: send-twilio-sms
        description: Send the order-confirmation SMS through Twilio.
        operationId: $sourceDescriptions.twilio.createMessage
        parameters:
          - name: AccountSid
            in: path
            value: $inputs.AccountSid
        requestBody:
          contentType: application/x-www-form-urlencoded
          payload:
            To: $steps.get-shopify-order.outputs.phone
            From: $inputs.From
            Body: >-
              Your order has been received. Thank you for your purchase!
        successCriteria:
          - condition: $statusCode == 201
        outputs:
          messageSid: $response.body#/sid
          messageStatus: $response.body#/status
    outputs:
      orderId: $steps.get-shopify-order.outputs.orderId
      phone: $steps.get-shopify-order.outputs.phone
      messageSid: $steps.send-twilio-sms.outputs.messageSid
      messageStatus: $steps.send-twilio-sms.outputs.messageStatus
