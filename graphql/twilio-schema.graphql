# Twilio GraphQL Schema (SDL)
#
# Conceptual data model covering Twilio Flex, TaskRouter, Conversations,
# Voice, Messaging, Video, Verify, and Accounts APIs.
#
# Source: derived from Twilio REST API documentation. The Flex GraphQL
# endpoint (https://flex-api.twilio.com/v1/graphql) is not publicly
# introspectable without a valid Flex access token.
#
# Schema version: 2026-06-14

scalar DateTime
scalar JSON
scalar URL

# ─────────────────────────────────────────────
# Enumerations
# ─────────────────────────────────────────────

enum AccountStatus {
  ACTIVE
  SUSPENDED
  CLOSED
}

enum CallStatus {
  QUEUED
  RINGING
  IN_PROGRESS
  CANCELED
  COMPLETED
  BUSY
  FAILED
  NO_ANSWER
}

enum CallDirection {
  INBOUND
  OUTBOUND_API
  OUTBOUND_DIAL
  TRUNKING_TERMINATING
  TRUNKING_ORIGINATING
}

enum MessageStatus {
  ACCEPTED
  SCHEDULED
  QUEUED
  SENDING
  SENT
  RECEIVING
  RECEIVED
  DELIVERED
  UNDELIVERED
  FAILED
  READ
  CANCELED
}

enum MessageDirection {
  INBOUND
  OUTBOUND_API
  OUTBOUND_CALL
  OUTBOUND_REPLY
}

enum RecordingStatus {
  IN_PROGRESS
  PAUSED
  STOPPED
  PROCESSING
  COMPLETED
  ABSENT
  DELETED
}

enum RecordingSource {
  DIAL_VERB
  CONFERENCE
  OUTBOUND_API
  TRUNKING
  RECORD_VERB
  SIP_DIALING
  CONFERENCE_RECORD_VERB
  GATEWAY
}

enum ConferenceStatus {
  INIT
  IN_PROGRESS
  COMPLETED
}

enum WorkerActivityStatus {
  AVAILABLE
  UNAVAILABLE
  OFFLINE
}

enum TaskStatus {
  PENDING
  RESERVED
  ASSIGNED
  CANCELED
  COMPLETED
  WRAPPING
}

enum TaskRouterEventType {
  WORKFLOW_ENTERED
  WORKFLOW_TIMEOUT
  WORKFLOW_SKIPPED
  TASK_CREATED
  TASK_CANCELED
  TASK_COMPLETED
  TASK_DELETED
  TASK_UPDATED
  TASK_WRAPUP
  TASK_SYSTEM_DELETED
  RESERVATION_CREATED
  RESERVATION_ACCEPTED
  RESERVATION_REJECTED
  RESERVATION_TIMEOUT
  RESERVATION_CANCELED
  RESERVATION_RESCINDED
  RESERVATION_COMPLETED
  WORKER_CREATED
  WORKER_DELETED
  WORKER_UPDATED
  WORKER_ACTIVITY_UPDATED
  WORKER_ATTRIBUTES_UPDATED
  WORKER_CAPACITY_UPDATED
  WORKER_CHANNEL_AVAILABILITY_UPDATED
  QUEUE_MISSED
  QUEUE_ENTERED
  QUEUE_ABANDONED
  WORKER_ENTERED_QUEUE
  WORKSPACE_UPDATED
}

enum ReservationStatus {
  PENDING
