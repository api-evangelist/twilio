description: >-
  Probe of the /.well-known/ discovery surface on Twilio's primary hosts. Twilio
  does not publish machine-readable discovery documents at these paths — every
  probed path returned 404. Absence is recorded as valid data; no WellKnown
  rating pointer is emitted because no catalog was found. Twilio's OAuth/OIDC is
  product-scoped (not a single authorization server) and it uses HTTP Basic
  (Account SID + Auth Token / API Key) for the REST API rather than OIDC
  discovery. Security-contact discovery lives at the pages captured in
  security/twilio-vulnerability-disclosure.yml, not in /.well-known/security.txt.
